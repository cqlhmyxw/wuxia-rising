<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>武侠·崛起</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a120e;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;}
canvas{display:block;background:#f5e6c8;border-radius:8px;box-shadow:0 0 30px rgba(0,0,0,0.5);}
#ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;justify-content:center;align-items:center;}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
const W = 480, H = 720;
const canvas = document.getElementById('gc');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// ===== 数据 =====
const LV = ['初学乍练','粗通皮毛','略有小成','驾轻就熟','融会贯通','炉火纯青','登峰造极','出神入化','超凡入圣','返璞归真'];
const MAX_EXP = 5000;
const SKILLS = [
  {id:'f1',name:'基础拳法',pow:10,expPer:5,ico:'👊'},
  {id:'f2',name:'太极拳',pow:30,expPer:4,ico:'☯️'},
  {id:'f3',name:'降龙十八掌',pow:80,expPer:3,ico:'🐉'},
  {id:'j1',name:'基础剑法',pow:12,expPer:5,ico:'⚔️'},
  {id:'j2',name:'独孤九剑',pow:70,expPer:3,ico:'🗡️'},
  {id:'j3',name:'玄铁剑法',pow:90,expPer:2,ico:'⚫'},
];
const PRACTICE_EVENTS = [{n:'正常',p:0.7,m:1},{n:'灵光',p:0.15,m:3},{n:'贯通',p:0.08,m:5},{n:'顿悟',p:0.015,m:15}];
const FATES = [{id:'tl',n:'天灵根',r:'S',w:1,desc:'修炼+50%'},{id:'hd',n:'混沌之体',r:'S',w:1,desc:'全系兼修'},{id:'jw',n:'绝世悟性',r:'S',w:1,desc:'突破+30%'},{id:'ft',n:'凡体',r:'D',w:49,desc:'后天×2'}];
const C_RAR={S:'#c0392b',A:'#d4a574',B:'#8b6914',C:'#5a7a3a',D:'#808080'};

// ===== 游戏状态 =====
let G = {};
let scene = 'map'; // map, house, practice, backhill
let curSkill = null;
let curMon = null;
let inBattle = false;
let animFrame = 0;
let particles = [];
let monsters = [];
let shakeTimer = 0;

function ld(){try{let s=localStorage.getItem('wx2');if(s)return JSON.parse(s)}catch(e){}return {p:0,c:0,d:1,sp:[],ik:[],f:[],y:0,log:[]};}
function sv(){try{localStorage.setItem('wx2',JSON.stringify(G))}catch(e){}}
function rn(a,b){return a+Math.random()*(b-a)}

// ===== Canvas 2D 渲染 =====

// 绘制古风山谷地图背景
function drawMapBG(){
  // 天空渐变
  let grad = ctx.createLinearGradient(0,0,0,H*0.5);
  grad.addColorStop(0,'#87CEEB');
  grad.addColorStop(0.5,'#E8F4F8');
  grad.addColorStop(1,'#f5e6c8');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H*0.5);
  
  // 远山
  ctx.fillStyle = '#c5a680';
  ctx.beginPath();
  ctx.moveTo(0,H*0.35);
  for(let x=0;x<=W;x+=40){
    ctx.lineTo(x,H*0.35-Math.sin(x*0.03)*30-Math.sin(x*0.01)*20);
  }
  ctx.lineTo(W,H*0.45);
  ctx.lineTo(0,H*0.45);
  ctx.closePath();
  ctx.fill();
  
  // 近山
  ctx.fillStyle = '#a08060';
  ctx.beginPath();
  ctx.moveTo(0,H*0.42);
  for(let x=0;x<=W;x+=30){
    ctx.lineTo(x,H*0.42-Math.sin(x*0.02+1)*25-Math.sin(x*0.008+2)*15);
  }
  ctx.lineTo(W,H*0.5);
  ctx.lineTo(0,H*0.5);
  ctx.closePath();
  ctx.fill();
  
  // 地面
  grad = ctx.createLinearGradient(0,H*0.5,0,H);
  grad.addColorStop(0,'#9ac791');
  grad.addColorStop(0.3,'#7a9a5a');
  grad.addColorStop(0.6,'#5a7a3a');
  grad.addColorStop(1,'#3a5a2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0,H*0.5,W,H*0.5);
  
  // 小路
  ctx.fillStyle = '#c5a680';
  ctx.beginPath();
  ctx.moveTo(W*0.5,H);
  ctx.quadraticCurveTo(W*0.45,H*0.7,W*0.5,H*0.55);
  ctx.quadraticCurveTo(W*0.55,H*0.45,W*0.5,H*0.4);
  ctx.lineTo(W*0.5+20,H*0.4);
  ctx.lineTo(W*0.5+15,H);
  ctx.closePath();
  ctx.fill();
}

// 绘制主角（持剑侠客）
function drawPlayer(x,y,scale=1){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  
  // 身体（青衫）
  ctx.fillStyle = '#3a6a4a';
  ctx.fillRect(-12,-25,24,30);
  
  // 头
  ctx.fillStyle = '#f0d8a0';
  ctx.beginPath();
  ctx.arc(0,-28,12,0,Math.PI*2);
  ctx.fill();
  
  // 头发（束发）
  ctx.fillStyle = '#2c1810';
  ctx.beginPath();
  ctx.arc(0,-32,10,0,Math.PI*2);
  ctx.fill();
  
  // 发髻
  ctx.fillRect(-3,-42,6,10);
  
  // 剑（右手）
  ctx.strokeStyle = '#c0c0c0';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(14,-20);
  ctx.lineTo(14+20*Math.sin(animFrame*0.05),-20+20*Math.cos(animFrame*0.05));
  ctx.stroke();
  
  // 剑柄
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(10,-22,8,5);
  
  // 腰带
  ctx.fillStyle = '#8b2500';
  ctx.fillRect(-12,-6,24,3);
  
  ctx.restore();
}

// 绘制建筑（茅屋）
function drawHouse(x,y){
  // 屋顶
  ctx.fillStyle = '#8b6914';
  ctx.beginPath();
  ctx.moveTo(x-30,y);
  ctx.lineTo(x,y-25);
  ctx.lineTo(x+30,y);
  ctx.closePath();
  ctx.fill();
  
  // 墙体
  ctx.fillStyle = '#d4c5a9';
  ctx.fillRect(x-25,y-2,50,40);
  
  // 门
  ctx.fillStyle = '#5a3a2a';
  ctx.fillRect(x-8,y+8,16,30);
  
  // 窗
  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(x-20,y+5,12,12);
  ctx.fillRect(x+8,y+5,12,12);
}

// 绘制练功桩
function drawPole(x,y){
  ctx.fillStyle = '#5a3a2a';
  ctx.fillRect(x-5,y-20,10,40);
  ctx.fillRect(x-15,y-20,30,5);
  ctx.fillRect(x-15,y-8,30,3);
}

// ===== 怪物绘制 =====
function drawMonster(x,y,type){
  const monsters = {
    '野狼':()=>{
      ctx.fillStyle = '#808080';
      ctx.beginPath();
      ctx.ellipse(x,y,25,15,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#666';
      ctx.beginPath();
      ctx.arc(x-15,y-8,8,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.arc(x-20,y-12,3,0,Math.PI*2);
      ctx.fill();
    },
    '猛虎':()=>{
      ctx.fillStyle = '#d4a574';
      ctx.beginPath();
      ctx.ellipse(x,y,35,20,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#8b6914';
      for(let i=-20;i<=20;i+=12){
        ctx.fillRect(x+i,y-5,6,3);
      }
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x-20,y-10,8,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.arc(x-24,y-14,3,0,Math.PI*2);
      ctx.fill();
    },
    '黑熊':()=>{
      ctx.fillStyle = '#3a2218';
      ctx.beginPath();
      ctx.ellipse(x,y,30,22,0,0,Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x-10,y-15,12,0,Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x+10,y-15,12,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#8b6914';
      ctx.beginPath();
      ctx.arc(x-12,y-18,4,0,Math.PI*2);
      ctx.fill();
    },
  };
  if(monsters[type]) monsters[type]();
}

// ===== 粒子特效 =====
function addParticles(x,y,count,color){
  for(let i=0;i<count;i++){
    particles.push({
      x,y,vx:rn(-3,3),vy:rn(-5,-1),life:rn(20,40),maxLife:40,color,
    });
  }
}

function updateParticles(){
  particles = particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--;
    return p.life>0;
  });
  particles.forEach(p=>{
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,3*(p.life/p.maxLife),0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ===== 场景绘制 =====
function drawMapScene(){
  drawMapBG();
  
  // 地点：茅屋（左上）
  drawHouse(80,380);
  ctx.fillStyle = '#2c1810';
  ctx.font = '11px KaiTi';
  ctx.textAlign = 'center';
  ctx.fillText('🏠 小屋',80,420);
  
  // 练功场（右上）
  for(let i=0;i<3;i++) drawPole(340+30*i,400);
  ctx.fillText('🪵 练功场',370,430);
  
  // 钓鱼台（右下）
  ctx.fillStyle = '#4a8ab5';
  ctx.beginPath();
  ctx.ellipse(120,500,40,15,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillText('🎣 钓鱼台',120,530);
  
  // 后山（左中）
  ctx.fillStyle = '#3a6a2a';
  ctx.beginPath();
  ctx.moveTo(300,380);
  ctx.lineTo(320,330);
  ctx.lineTo(340,380);
  ctx.closePath();
  ctx.fill();
  ctx.fillText('🌲 后山',320,370);
  
  // 主角站在中央
  drawPlayer(W*0.5,H*0.65);
  
  // 主角名称
  ctx.fillStyle = '#2c1810';
  ctx.font = '12px KaiTi';
  ctx.textAlign = 'center';
  ctx.fillText('无名',W*0.5,H*0.65+40);
  
  // 状态信息
  ctx.fillStyle = '#5a3a2a';
  ctx.font = '11px KaiTi';
  ctx.fillText('功力:'+G.p+' 修为:'+G.c+' 第'+G.d+'日',W*0.5,30);
  
  updateParticles();
  
  // 提示
  ctx.fillStyle = '#a08060';
  ctx.font = '10px KaiTi';
  ctx.fillText('点击场景文字进入',W*0.5,H-10);
}

// ===== 主循环 =====
function gameLoop(){
  animFrame++;
  ctx.clearRect(0,0,W,H);
  
  switch(scene){
    case 'map':
      drawMapScene();
      break;
    case 'backhill':
      drawBackHill();
      break;
  }
  
  requestAnimationFrame(gameLoop);
}

// 后山场景
function drawBackHill(){
  // 背景
  let grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#2a4a1a');
  grad.addColorStop(0.5,'#1a3a0a');
  grad.addColorStop(1,'#0a1a00');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
  
  // 树
  ctx.fillStyle = '#2a5a1a';
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.arc(50+i*100,200,50,0,Math.PI*2);
    ctx.fill();
  }
  
  // 路径
  ctx.fillStyle = '#3a4a2a';
  ctx.fillRect(W*0.45,0,30,H);
  
  if(curMon && inBattle){
    drawMonster(W*0.5,H*0.4,curMon.n);
    
    ctx.fillStyle = '#e8d5b0';
    ctx.font = '13px KaiTi';
    ctx.textAlign = 'center';
    ctx.fillText(curMon.n+' HP:'+curMon.hp+'/'+curMon.mh,W*0.5,H*0.55);
    
    // HP条
    ctx.fillStyle = '#333';
    ctx.fillRect(W*0.3,H*0.58,W*0.4,8);
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(W*0.3,H*0.58,W*0.4*(curMon.hp/curMon.mh),8);
  } else {
    ctx.fillStyle = '#e8d5b0';
    ctx.font = '14px KaiTi';
    ctx.textAlign = 'center';
    ctx.fillText('🌳 外围 🐺野狼 🐗野猪',W*0.5,H*0.3);
    ctx.fillText('🌲 深处 🐍毒蛇 🗡️山贼 🐯猛虎',W*0.5,H*0.5);
    ctx.fillText('⛰️险地 🐻黑熊 👺山魈 🐉巨蟒',W*0.5,H*0.7);
    
    ctx.fillStyle = '#a08060';
    ctx.font = '11px KaiTi';
    ctx.fillText('点击区域名称进入',W*0.5,H*0.85);
  }
}

// ===== 初始化 =====
function init(){
  G = ld();
  if(!G.p) G.p = 0;
  gameLoop();
}

init();
</script>
</body>
</html>
