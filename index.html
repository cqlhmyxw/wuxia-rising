<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>武侠·崛起</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a120e;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;touch-action:none;}
canvas{display:block;border-radius:4px;box-shadow:0 0 20px rgba(0,0,0,0.5);}
</style>
</head>
<body><canvas></canvas>
<script>
const canvas = document.querySelector('canvas');
const ctx = canvas.getContext('2d');
const W = 480, H = 720;
canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
canvas.style.width = W+'px'; canvas.style.height = H+'px';
ctx.scale(devicePixelRatio, devicePixelRatio);

// ===== 世界数据 =====
// 地图分块: 0=可走, 1=障碍
const MAP = [];
for(let y=0;y<36;y++){
  MAP[y]=[];
  for(let x=0;x<24;x++){
    let v=0;
    // 水（左下方大片水域）
    if(x<10 && y>22) v=1;
    // 房子（中央左侧茅屋）
    if(x>=2&&x<=5 && y>=12&&y<=16) v=1;
    // 房子（右上）
    if(x>=16&&x<=20 && y>=8&&y<=12) v=1;
    // 石头（几个位置）
    if((x===12&&y===18)||(x===18&&y===20)||(x===5&&y===20)) v=1;
    // 树（散落）
    if((x===3&&y===8)||(x===8&&y===6)||(x===15&&y===4)||(x===20&&y===15)||(x===10&&y===25)||(x===18&&y===28)) v=1;
    // 围栏边线
    if(y===2||y===33||x===1||x===22) v=1;
    MAP[y][x]=v;
  }
}

// 场景入口（碰撞检测范围）
const ENTRANCES = [
  {x:3,y:14,w:4,h:3,name:'小屋',icon:'🏠'},
  {x:17,y:10,w:4,h:3,name:'练功场',icon:'🪵'},
  {x:8,y:24,w:4,h:3,name:'钓鱼台',icon:'🎣'},
  {x:17,y:20,w:4,h:3,name:'后山',icon:'🌲'},
  {x:2,y:6,w:3,h:3,name:'藏书阁',icon:'📚'},
  {x:20,y:4,w:3,h:3,name:'出师',icon:'🚪'},
];

// ===== 游戏状态 =====
let G = {};
function ld(){try{let s=localStorage.getItem('wx');if(s)return JSON.parse(s)}catch(e){}return {p:0,c:0,d:1,sp:[]};}
function sv(){try{localStorage.setItem('wx',JSON.stringify(G))}catch(e){}}
G = ld();
if(!G.p) G.p = 0; if(!G.c) G.c = 0; if(!G.d) G.d = 1; if(!G.sp) G.sp = [];

// 主角位置（格子坐标）
let px = 12, py = 20;
let pdir = 0; // 0下 1上 2左 3右

// 战斗状态
let curMon = null;
let inBattle = false;

// ===== 输入 =====
let keys = {};
document.addEventListener('keydown',e=>{keys[e.key]=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// ===== 游戏循环 =====
let frame = 0;
const TILE = 20;

function update(){
  frame++;
  if(inBattle) return; // 战斗中不能移动
  
  let dx=0,dy=0;
  if(keys['ArrowUp']||keys['w']||keys['W']){dy=-1;pdir=1;}
  if(keys['ArrowDown']||keys['s']||keys['S']){dy=1;pdir=0;}
  if(keys['ArrowLeft']||keys['a']||keys['A']){dx=-1;pdir=2;}
  if(keys['ArrowRight']||keys['d']||keys['D']){dx=1;pdir=3;}
  
  if(dx!==0||dy!==0){
    let nx=px+dx, ny=py+dy;
    // 边界
    if(nx>=1&&nx<23&&ny>=3&&ny<33){
      // 碰撞检测
      if(MAP[ny]&&MAP[ny][nx]===0){
        px=nx; py=ny;
      }
    }
    
    // 检查是否进入场景
    for(const e of ENTRANCES){
      if(px>=e.x&&px<e.x+e.w && py>=e.y&&py<e.y+e.h){
        enterScene(e.name);
        break;
      }
    }
  }
  
  G.d++;
  sv();
}

function enterScene(name){
  // 进入场景逻辑（暂简单显示）
  console.log('进入:', name);
  // TODO: 场景渲染
}

// ===== 渲染 =====
function draw(){
  ctx.clearRect(0,0,W,H);
  
  // 绘制地图
  for(let y=0;y<36;y++){
    for(let x=0;x<24;x++){
      const v = MAP[y]?.[x]||1;
      if(v===0){
        // 草地
        ctx.fillStyle = (x+y)%2===0 ? '#8aba6a' : '#7aaa5a';
      } else {
        // 障碍
        ctx.fillStyle = '#3a5a2a';
      }
      ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
  }
  
  // 水面
  ctx.fillStyle = '#4a8ab580';
  for(let y=23;y<33;y++){
    for(let x=1;x<9;x++){
      ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
    }
  }
  
  // 茅屋
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(3*TILE,12*TILE,80,60);
  ctx.fillStyle = '#d4c5a9';
  ctx.fillRect(3*TILE+5,12*TILE+5,70,50);
  
  // 练功场木桩
  for(let i=0;i<3;i++){
    ctx.fillStyle = '#5a3a2a';
    ctx.fillRect((17+i)*TILE,12*TILE,8,30);
  }
  
  // 钓鱼台
  ctx.fillStyle = '#d4a574';
  ctx.fillRect(8*TILE,24*TILE,30,10);
  ctx.fillStyle = '#4a8ab5';
  ctx.beginPath();
  ctx.fillRect(6*TILE,25*TILE,60,15);
  ctx.fill();
  
  // 树木
  ctx.fillStyle = '#3a6a2a';
  for(const t of [[3,8],[8,6],[15,4],[20,15],[10,25],[18,28]]){
    ctx.beginPath();
    ctx.arc(t[0]*TILE+10,t[1]*TILE+10,12,0,Math.PI*2);
    ctx.fill();
  }
  
  // 场景入口标签
  ctx.font = '9px STKaiti';
  ctx.textAlign = 'center';
  for(const e of ENTRANCES){
    ctx.fillStyle = '#fff8ef';
    ctx.fillRect(e.x*TILE,e.y*TILE-10,e.w*TILE,10);
    ctx.fillStyle = '#2c1810';
    ctx.fillText(e.icon+' '+e.name,e.x*TILE+e.w*TILE/2,e.y*TILE-2);
  }
  
  // 主角
  ctx.save();
  ctx.translate(px*TILE+TILE/2,py*TILE+TILE/2);
  // 身体
  ctx.fillStyle = '#3a6a4a';
  ctx.fillRect(-8,-12,16,20);
  // 头
  ctx.fillStyle = '#f0d8a0';
  ctx.beginPath();
  ctx.arc(0,-15,8,0,Math.PI*2);
  ctx.fill();
  // 头发
  ctx.fillStyle = '#2c1810';
  ctx.beginPath();
  ctx.arc(0,-18,7,0,Math.PI*2);
  ctx.fill();
  // 剑
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(10,-8);
  ctx.lineTo(10+15*Math.sin(frame*0.05),-8+15*Math.cos(frame*0.05));
  ctx.stroke();
  ctx.restore();
  
  // HUD
  ctx.fillStyle = 'rgba(44,24,16,0.7)';
  ctx.fillRect(0,0,W,25);
  ctx.fillStyle = '#e8d5b0';
  ctx.font = '11px STKaiti';
  ctx.textAlign = 'left';
  ctx.fillText('功力:'+G.p+'  修为:'+G.c+'  第'+G.d+'日',10,17);
  ctx.textAlign = 'right';
  ctx.fillText('↑↓←→移动',W-10,17);
  
  // 战斗UI
  if(inBattle && curMon){
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,W,H);
    // 怪物
    ctx.fillStyle = '#808080';
    ctx.beginPath();
    ctx.ellipse(W/2,H*0.3,30,20,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#e8d5b0';
    ctx.font = '14px STKaiti';
    ctx.textAlign = 'center';
    ctx.fillText(curMon.n+' HP:'+curMon.hp+'/'+curMon.mh,W/2,H*0.35);
    // HP条
    ctx.fillStyle = '#333';
    ctx.fillRect(W*0.25,H*0.38,W*0.5,10);
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(W*0.25,H*0.38,W*0.5*(curMon.hp/curMon.mh),10);
  }
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
