<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>武侠·崛起 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a120e;overflow:hidden;touch-action:none;font-family:'KaiTi','STKaiti',serif}
canvas{display:block;width:100vw;height:100dvh}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a120e;color:#e8d5a0;display:flex;justify-content:center;align-items:center;font-size:20px;z-index:100;font-family:'KaiTi','STKaiti',serif}
#hud{position:fixed;top:0;left:0;right:0;height:40px;background:linear-gradient(180deg,rgba(30,18,10,.92),rgba(30,18,10,.7));display:flex;align-items:center;padding:0 12px;color:#e8d5a0;font-size:14px;z-index:10;gap:10px;pointer-events:none}
#hud .name{color:#f0d080;font-weight:bold}
#hud .stat{color:#c0a870}
#joystick{position:fixed;left:20px;bottom:30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);z-index:20;display:none;touch-action:none}
#joystick .knob{position:absolute;top:50%;left:50%;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.35);transform:translate(-50%,-50%);pointer-events:none}
@media(hover:none)and(pointer:coarse){#joystick{display:block}}
</style>
</head>
<body>
<div id="loading">加载3D场景中...<br><small style="font-size:12px;color:#a08060">首次加载约5-15秒</small></div>
<div id="hud"><span class="name">武侠·崛起 3D</span><span class="stat">方向键/WASD移动</span></div>
<div id="joystick"><div class="knob" id="knob"></div></div>

<!-- Three.js CDN（国内可用的镜像） -->
<script src="https://cdn.bootcdn.net/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ============ 场景 ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 50, 120);

// ============ 相机 ============
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(15, 12, 20);

// OrbitControls - 手指/鼠标拖拽360度旋转
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI/2.2;
controls.minDistance = 5;
controls.maxDistance = 35;
controls.update();

// ============ 渲染器 ============
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.insertBefore(renderer.domElement, document.body.firstChild);

// ============ 光照 ============
const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffe8c0, 1.2);
sunLight.position.set(30, 40, 20);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 100;
sunLight.shadow.camera.left = -30;
sunLight.shadow.camera.right = 30;
sunLight.shadow.camera.top = 30;
sunLight.shadow.camera.bottom = -30;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
fillLight.position.set(-20, 10, -10);
scene.add(fillLight);

// ============ 地形 ============
const groundGeo = new THREE.PlaneGeometry(60, 60);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x7a9a5a,
  roughness: 0.9,
  metalness: 0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.1;
ground.receiveShadow = true;
scene.add(ground);

// 草地装饰（随机小方块模拟草地）
for(let i=0;i<300;i++){
  const blade = new THREE.Mesh(
    new THREE.BoxGeometry(0.05, 0.15 + Math.random()*0.2, 0.05),
    new THREE.MeshStandardMaterial({color: new THREE.Color().setHSL(0.28+Math.random()*0.06, 0.5, 0.3+Math.random()*0.15)})
  );
  const angle = Math.random()*Math.PI*2;
  const dist = 3 + Math.random()*27;
  blade.position.set(Math.cos(angle)*dist, 0.05, Math.sin(angle)*dist);
  blade.castShadow = true;
  scene.add(blade);
}

// ============ 树 ============
function createTree(x, z, scale=1){
  const group = new THREE.Group();
  // 树干
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2*scale, 0.3*scale, 1.5*scale, 6),
    new THREE.MeshStandardMaterial({color: 0x5a3a1a, roughness: 0.9})
  );
  trunk.position.y = 0.75*scale;
  trunk.castShadow = true;
  group.add(trunk);
  // 树冠（3层球体）
  const colors = [0x3a7a2a, 0x4a8a3a, 0x5a9a4a];
  for(let i=0;i<3;i++){
    const crown = new THREE.Mesh(
      new THREE.SphereGeometry((1.2-i*0.25)*scale, 6, 6),
      new THREE.MeshStandardMaterial({color: colors[i], roughness: 0.8})
    );
    crown.position.set(
      (Math.random()-0.5)*0.5*scale,
      1.5*scale + i*0.4*scale,
      (Math.random()-0.5)*0.5*scale
    );
    crown.castShadow = true;
    group.add(crown);
  }
  group.position.set(x, 0, z);
  return group;
}

// 小树林
const trees = [];
const treePositions = [];
for(let i=0;i<25;i++){
  const angle = Math.random()*Math.PI*2;
  const dist = 6 + Math.random()*20;
  const x = Math.cos(angle)*dist, z = Math.sin(angle)*dist;
  const scale = 0.8 + Math.random()*0.6;
  const tree = createTree(x, z, scale);
  scene.add(tree);
  trees.push(tree);
  treePositions.push({x,z});
}

// ============ 建筑（古风小屋） ============
function createHouse(x, z){
  const group = new THREE.Group();
  // 墙
  const wall = new THREE.Mesh(
    new THREE.BoxGeometry(3, 1.8, 3),
    new THREE.MeshStandardMaterial({color: 0x8a6a3a, roughness: 0.9})
  );
  wall.position.y = 0.9;
  wall.castShadow = true;
  wall.receiveShadow = true;
  group.add(wall);
  // 屋顶
  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(2.4, 0.8, 4),
    new THREE.MeshStandardMaterial({color: 0x6a3a1a, roughness: 0.8})
  );
  roof.position.y = 2.2;
  roof.rotation.y = Math.PI/4;
  roof.castShadow = true;
  group.add(roof);
  // 门
  const door = new THREE.Mesh(
    new THREE.PlaneGeometry(0.6, 1.2),
    new THREE.MeshStandardMaterial({color: 0x4a2a0a})
  );
  door.position.set(0, 0.6, 1.51);
  group.add(door);
  group.position.set(x, 0, z);
  return group;
}

const houses = new THREE.Group();
for(let i=0;i<5;i++){
  const angle = Math.random()*Math.PI*2;
  const dist = 8 + Math.random()*12;
  const x = Math.cos(angle)*dist, z = Math.sin(angle)*dist;
  const house = createHouse(x, z);
  houses.add(house);
}
scene.add(houses);


// ============ 主角（组合成完整人物形象） ============
function createPlayer(){
  const group = new THREE.Group();
  
  // 身体（古风青衫）
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.45, 0.9, 8),
    new THREE.MeshStandardMaterial({color: 0x3a6a4a, roughness: 0.7})
  );
  body.position.y = 0.7;
  body.castShadow = true;
  group.add(body);
  
  // 头
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.28, 10, 10),
    new THREE.MeshStandardMaterial({color: 0xe8c080, roughness: 0.5})
  );
  head.position.y = 1.2;
  head.castShadow = true;
  group.add(head);
  
  // 发髻
  const bun = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 6, 6),
    new THREE.MeshStandardMaterial({color: 0x1a1a1a, roughness: 0.9})
  );
  bun.position.set(0, 1.42, 0.08);
  group.add(bun);
  
  // 左臂
  const lArm = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.09, 0.4, 6),
    new THREE.MeshStandardMaterial({color: 0x3a6a4a, roughness: 0.7})
  );
  lArm.position.set(-0.38, 0.8, 0);
  lArm.rotation.z = 0.15;
  lArm.castShadow = true;
  group.add(lArm);
  
  // 右臂
  const rArm = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.09, 0.4, 6),
    new THREE.MeshStandardMaterial({color: 0x3a6a4a, roughness: 0.7})
  );
  rArm.position.set(0.38, 0.8, 0);
  rArm.rotation.z = -0.15;
  rArm.castShadow = true;
  group.add(rArm);
  
  // 剑（挂在右侧）
  const sword = new THREE.Mesh(
    new THREE.BoxGeometry(0.04, 0.5, 0.015),
    new THREE.MeshStandardMaterial({color: 0xd0d0d0, metalness: 0.8, roughness: 0.2})
  );
  sword.position.set(0.45, 0.55, 0);
  group.add(sword);
  const sHandle = new THREE.Mesh(
    new THREE.BoxGeometry(0.06, 0.12, 0.03),
    new THREE.MeshStandardMaterial({color: 0x4a2a0a, roughness: 0.9})
  );
  sHandle.position.set(0.45, 0.25, 0);
  group.add(sHandle);
  
  // 腰带
  const belt = new THREE.Mesh(
    new THREE.TorusGeometry(0.25, 0.04, 6, 12),
    new THREE.MeshStandardMaterial({color: 0x8b4513, roughness: 0.8})
  );
  belt.position.y = 0.5;
  belt.rotation.x = Math.PI/2;
  group.add(belt);
  
  // 衣摆（下身裙摆状的装饰）
  const skirt = new THREE.Mesh(
    new THREE.ConeGeometry(0.35, 0.15, 8),
    new THREE.MeshStandardMaterial({color: 0x3a6a4a, roughness: 0.7})
  );
  skirt.position.y = 0.25;
  group.add(skirt);
  
  return group;
}

const player = createPlayer();
player.position.set(0, 0, 0);
scene.add(player);

// ============ 移动控制 ============
const keys = {};
let targetX = 0, targetZ = 0;
let playerAngle = 0;

document.addEventListener('keydown', e=>{
  keys[e.key] = true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e=>{keys[e.key]=false;});

// 摇杆
const jDiv = document.getElementById('joystick');
const knob = document.getElementById('knob');
let jActive=false, jId=null, jDx=0, jDy=0;

jDiv.addEventListener('pointerdown', e=>{
  jActive=true; jId=e.pointerId; jDiv.setPointerCapture(e.pointerId);
  updateJoy(e);
});
jDiv.addEventListener('pointermove', e=>{if(jActive&&e.pointerId===jId)updateJoy(e);});
jDiv.addEventListener('pointerup', e=>{if(e.pointerId===jId){jActive=false;jId=null;jDx=0;jDy=0;knob.style.transform='translate(-50%,-50%)';}});
jDiv.addEventListener('pointercancel', e=>{if(e.pointerId===jId){jActive=false;jId=null;jDx=0;jDy=0;knob.style.transform='translate(-50%,-50%)';}});

function updateJoy(e){
  const rect=jDiv.getBoundingClientRect();
  const cx=rect.width/2, cy=rect.height/2;
  let dx=e.clientX-rect.left-cx, dy=e.clientY-rect.top-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const r=55;
  if(dist>r){dx=dx/dist*r; dy=dy/dist*r;}
  jDx=dx/r; jDy=dy/r;
  knob.style.transform=`translate(${dx-25}px,${dy-25}px)`;
}

// ============ 游戏循环 ============
const SPEED = 5;
const TURN_SPEED = 0.08;
let inHouse = false;
let currentHouse = null;

function update(){
  if(inHouse) {
    // 室内模式 - 不处理移动
    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(update);
    return;
  }
  
  let dx=0, dy=0;
  if(keys['ArrowUp']||keys['w']||keys['W']||jDy<-0.3) dy=-1;
  if(keys['ArrowDown']||keys['s']||keys['S']||jDy>0.3) dy=1;
  if(keys['ArrowLeft']||keys['a']||keys['A']||jDx<-0.3) dx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']||jDx>0.3) dx=1;

  if(dx!==0||dy!==0){
    const len=Math.sqrt(dx*dx+dy*dy);
    const nx = player.position.x + dx/len * SPEED * 0.016;
    const nz = player.position.z + dy/len * SPEED * 0.016;

    // 约束在场景内
    player.position.x = Math.max(-28, Math.min(28, nx));
    player.position.z = Math.max(-28, Math.min(28, nz));

    // 朝向移动方向
    const targetAngle = Math.atan2(dx, dy);
    let diff = targetAngle - playerAngle;
    while(diff > Math.PI) diff -= Math.PI*2;
    while(diff < -Math.PI) diff += Math.PI*2;
    playerAngle += diff * 0.15;
    player.rotation.y = playerAngle;

    // 走路起伏
    player.position.y = Math.sin(Date.now() * 0.008) * 0.04;
  } else {
    player.position.y = 0;
  }

  // 检测是否靠近房子（碰撞检测）
  let nearHouse = false;
  houses.children.forEach((child, i)=>{
    const hx = child.position.x;
    const hz = child.position.z;
    const dist = Math.sqrt(
      (player.position.x-hx)**2 + (player.position.z-hz)**2
    );
    if(dist < 2.5 && !nearHouse) nearHouse = true;
  });
  
  // 按空格键进屋
  if(nearHouse && keys[' '] && !inHouse) {
    enterHouse(0);
    keys[' '] = false;
  }

  // 控制器的target跟随玩家
  controls.target.lerp(new THREE.Vector3(player.position.x, 0, player.position.z), 0.05);
  controls.update();

  renderer.render(scene, camera);
  requestAnimationFrame(update);
}

// ============ 场景切换（进屋/出屋） ============
function enterHouse(index){
  inHouse = true;
  currentHouse = index;
  // 把房屋周围隐藏，渲染室内场景
  // 简化版：显示一个室内全景
  houses.visible = false;
  trees.forEach(t=>t.visible = false);
  ground.visible = false;
  player.visible = false;
  
  // 室内场景
  createInterior();
  
  // HUD提示
  document.getElementById('hud').innerHTML = '<span class="name">🏠 室内</span><span class="stat">按 ESC 离开</span>';
}

function exitHouse(){
  inHouse = false;
  houses.visible = true;
  trees.forEach(t=>t.visible = true);
  ground.visible = true;
  player.visible = true;
  document.getElementById('hud').innerHTML = '<span class="name">武侠·崛起 3D</span><span class="stat">方向键/WASD移动 · 空格进屋 · 拖拽旋转</span>';
}

// 室内场景
let interiorGroup = null;
function createInterior(){
  if(interiorGroup) { scene.remove(interiorGroup); }
  interiorGroup = new THREE.Group();
  
  // 地面
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 6),
    new THREE.MeshStandardMaterial({color: 0x8a7040, roughness: 0.9})
  );
  floor.rotation.x = -Math.PI/2;
  floor.position.y = -0.5;
  interiorGroup.add(floor);
  
  // 墙（四面）
  const wallMat = new THREE.MeshStandardMaterial({color: 0xc0a080, roughness: 0.9, side: THREE.DoubleSide});
  const walls = [
    {pos:[0,1.5,-3],size:[6,3,0.1]},
    {pos:[0,1.5,3],size:[6,3,0.1]},
    {pos:[-3,1.5,0],size:[0.1,3,6]},
    {pos:[3,1.5,0],size:[0.1,3,6]}
  ];
  walls.forEach(w=>{
    const wall = new THREE.Mesh(new THREE.BoxGeometry(...w.size), wallMat);
    wall.position.set(...w.pos);
    wall.receiveShadow = true;
    interiorGroup.add(wall);
  });
  
  // 屋顶
  const ceiling = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 6),
    new THREE.MeshStandardMaterial({color: 0xa08060, roughness: 0.9, side: THREE.DoubleSide})
  );
  ceiling.position.y = 3;
  ceiling.rotation.x = Math.PI/2;
  interiorGroup.add(ceiling);
  
  // 桌子
  const table = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.05, 0.5),
    new THREE.MeshStandardMaterial({color: 0x6a4a2a, roughness: 0.8})
  );
  table.position.set(0, 0.5, 0);
  interiorGroup.add(table);
  // 桌腿
  for(let tx of [-0.35, 0.35]){
    for(let tz of [-0.2, 0.2]){
      const leg = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.02, 0.5, 4),
        new THREE.MeshStandardMaterial({color: 0x6a4a2a, roughness: 0.8})
      );
      leg.position.set(tx, 0.25, tz);
      interiorGroup.add(leg);
    }
  }
  
  // 床
  const bed = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.15, 1.2),
    new THREE.MeshStandardMaterial({color: 0x5a6a4a, roughness: 0.9})
  );
  bed.position.set(-1.5, 0.25, 0.5);
  interiorGroup.add(bed);
  const bedMat = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.02, 1.2),
    new THREE.MeshStandardMaterial({color: 0x8a7a5a, roughness: 0.9})
  );
  bedMat.position.set(-1.5, 0.35, 0.5);
  interiorGroup.add(bedMat);
  
  // 书架
  const shelf = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 1.2, 0.15),
    new THREE.MeshStandardMaterial({color: 0x6a4a2a, roughness: 0.8})
  );
  shelf.position.set(1.5, 0.8, -2.5);
  interiorGroup.add(shelf);
  
  // 点燃的灯（黄色小方块）
  const lamp = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 6, 6),
    new THREE.MeshStandardMaterial({color: 0xffaa40, emissive: 0xff8800, emissiveIntensity: 1.5})
  );
  lamp.position.set(0, 2.5, 0);
  interiorGroup.add(lamp);
  
  // 室内光照
  const interiorLight = new THREE.PointLight(0xffcc80, 0.8, 8);
  interiorLight.position.set(0, 2.5, 0);
  interiorGroup.add(interiorLight);
  
  scene.add(interiorGroup);
  
  // 相机移到室内
  camera.position.set(2, 2, 4);
  controls.target.set(0, 0.5, 0);
  controls.minDistance = 1;
  controls.maxDistance = 8;
  controls.update();
}

// 按ESC离开
document.addEventListener('keydown', e=>{
  if(e.key === 'Escape' && inHouse) {
    exitHouse();
    camera.position.set(15, 12, 20);
    controls.target.set(0, 0, 0);
    controls.minDistance = 5;
    controls.maxDistance = 35;
    controls.update();
  }
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});

// 窗口缩放
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// 启动
setTimeout(()=>{
  const el = document.getElementById('loading');
  if(el) el.style.display = 'none';
}, 10000);
// 如果Three.js已加载则立刻隐藏
if(typeof THREE !== 'undefined'){
  document.getElementById('loading').style.display = 'none';
}
update();
</script>
</body>
</html>
