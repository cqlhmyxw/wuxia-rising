<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>武侠·崛起 — 小山谷</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{
    background:#f5e6c8; color:#2c1810;
    font-family:'STKaiti','KaiTi','Noto Serif SC',serif;
    min-height:100vh; overflow-x:hidden;
    background-image:radial-gradient(ellipse at 50% 100%, #e8d5b0 0%, #f5e6c8 60%);
}
#app{ max-width:480px; margin:0 auto; min-height:100vh; position:relative; }

/* ===== 顶部角色栏 ===== */
.top-bar{
    background:linear-gradient(180deg, #2c1810 0%, #3d2415 100%);
    padding:12px 16px; display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:10;
}
.avatar{
    width:48px; height:48px; border-radius:50%;
    background:linear-gradient(135deg, #8b2500, #c0392b);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; color:#f5e6c8; font-weight:700;
    border:2px solid #d4a574; flex-shrink:0;
}
.player-info{ flex:1; min-width:0; }
.player-name{ color:#f5e6c8; font-size:16px; font-weight:700; letter-spacing:2px; }
.player-fate{ color:#d4a574; font-size:11px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.player-stats{ display:flex; gap:8px; margin-top:4px; }
.player-stats span{ color:#a08060; font-size:10px; }
.player-stats span strong{ color:#f5e6c8; font-weight:400; }

/* ===== 主场景 ===== */
.scene{
    padding:16px; position:relative;
    min-height:400px;
    background:linear-gradient(180deg, #87CEEB 0%, #B0E0E6 30%, #90EE90 50%, #228B22 100%);
    border-bottom:3px solid #2c1810;
}
.scene-title{
    text-align:center; font-size:14px; color:#2c1810;
    background:rgba(245,230,200,0.8); padding:4px 12px;
    border-radius:4px; display:inline-block; margin:0 auto 12px;
    width:100%;
}
/* 场景网格 */
.scene-grid{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap:8px;
}
.scene-spot{
    background:rgba(245,230,200,0.85);
    border:2px solid #8b4513; border-radius:8px;
    padding:12px 8px; text-align:center; cursor:pointer;
    transition:all 0.2s; min-height:80px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.scene-spot:active{ transform:scale(0.95); background:rgba(245,230,200,1); }
.scene-spot .icon{ font-size:28px; margin-bottom:4px; }
.scene-spot .name{ font-size:12px; color:#2c1810; font-weight:600; }
.scene-spot .hint{ font-size:9px; color:#8b6914; margin-top:2px; }
.spot-1{ grid-column:2; grid-row:1; } /* 小屋 */
.spot-2{ grid-column:1; grid-row:2; } /* 练功场 */
.spot-3{ grid-column:3; grid-row:2; } /* 钓鱼台 */
.spot-4{ grid-column:2; grid-row:3; } /* 后山 */
.spot-5{ grid-column:1; grid-row:1; } /* 藏书阁 */
.spot-6{ grid-column:3; grid-row:1; } /* 山门 */

/* ===== 内容面板 ===== */
.panel{
    background:#fff8ef; border:1px solid #d4c5a9;
    border-radius:8px; margin:12px 16px; padding:16px;
    display:none; position:relative;
}
.panel.active{ display:block; }
.panel-title{
    font-size:16px; font-weight:700; text-align:center;
    padding-bottom:8px; border-bottom:1px solid #d4c5a9; margin-bottom:12px;
    color:#2c1810;
}
.panel-back{
    position:absolute; top:8px; left:8px; cursor:pointer;
    color:#8b2500; font-size:12px;
}
.panel-back:hover{ text-decoration:underline; }

/* ===== 武功列表 ===== */
.skill-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.skill-card{
    background:#f5e6c8; border:1px solid #d4c5a9; border-radius:6px;
    padding:10px; cursor:pointer; transition:all 0.2s;
}
.skill-card:active{ transform:scale(0.97); background:#efe0bc; }
.skill-card .sk-name{ font-size:13px; font-weight:600; }
.skill-card .sk-type{ font-size:10px; color:#8b6914; }
.skill-card .sk-lv{ font-size:11px; color:#2c1810; margin-top:4px; }
.skill-card .sk-bar{
    width:100%; height:4px; background:#d4c5a9; border-radius:2px; margin-top:4px; overflow:hidden;
}
.skill-card .sk-fill{
    height:100%; background:#8b2500; border-radius:2px; transition:width 0.3s;
}

/* ===== 练功/打坐动画 ===== */
.practice-area{
    text-align:center; padding:20px 0;
}
.practice-anim{
    width:80px; height:80px; margin:0 auto 16px;
    background:#2c1810; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:36px; animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.05); } }
.practice-text{ font-size:13px; color:#5a3a2a; line-height:1.8; margin-bottom:12px; min-height:40px; }
.practice-btn{
    background:#8b2500; color:#f5e6c8; border:none; border-radius:6px;
    padding:12px 32px; font-size:16px; font-family:inherit; letter-spacing:2px;
    cursor:pointer; transition:all 0.2s;
}
.practice-btn:active{ transform:scale(0.95); background:#6b1d00; }
.practice-btn:disabled{ opacity:0.5; cursor:not-allowed; }

/* ===== 日志 ===== */
.log-box{
    background:rgba(44,24,16,0.05); border-radius:6px;
    padding:10px; height:120px; overflow-y:auto;
    font-size:11px; line-height:1.7; margin-top:12px;
}
.log-box::-webkit-scrollbar{ width:2px; }
.log-box::-webkit-scrollbar-thumb{ background:#d4c5a9; border-radius:2px; }
.le{ padding:2px 0; border-bottom:1px solid rgba(44,24,16,0.03); }
.le .tm{ color:#a08060; }
.le .hl{ color:#8b2500; }
.le .ach{ color:#c0392b; font-weight:600; }

/* ===== 命格抽签 ===== */
.fate-draw-overlay{
    position:fixed; inset:0; background:rgba(44,24,16,0.9); z-index:100;
    display:flex; align-items:center; justify-content:center;
    animation:fadeIn 0.5s ease;
}
@keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
.fate-card{
    background:linear-gradient(135deg, #f5e6c8, #efe0bc);
    border:3px solid #8b2500; border-radius:12px;
    padding:32px 24px; max-width:320px; width:90%; text-align:center;
    animation:cardIn 0.6s ease;
}
@keyframes cardIn{ from{ transform:scale(0.5) rotate(-10deg); opacity:0; } to{ transform:scale(1) rotate(0); opacity:1; } }
.fate-rarity{ font-size:28px; margin-bottom:8px; }
.fate-name{ font-size:22px; font-weight:700; color:#2c1810; margin-bottom:4px; letter-spacing:4px; }
.fate-desc{ font-size:14px; color:#5a3a2a; margin-bottom:8px; }
.fate-extra{ font-size:11px; color:#8b6914; }
.fate-btn{
    margin-top:16px; background:#8b2500; color:#f5e6c8; border:none;
    border-radius:6px; padding:10px 24px; font-size:14px; font-family:inherit;
    cursor:pointer; letter-spacing:2px;
}

/* ===== 命格觉醒弹窗 ===== */
.alert-overlay{
    position:fixed; inset:0; background:rgba(44,24,16,0.7); z-index:100;
    display:flex; align-items:center; justify-content:center;
    animation:fadeIn 0.3s ease;
}
.alert-box{
    background:#fff8ef; border:2px solid #c0392b; border-radius:10px;
    padding:24px 20px; max-width:300px; width:90%; text-align:center;
    animation:cardIn 0.4s ease;
}
.alert-box h3{ font-size:18px; color:#8b2500; margin-bottom:8px; }
.alert-box p{ font-size:13px; color:#5a3a2a; line-height:1.6; }
.alert-btn{
    margin-top:12px; background:#8b2500; color:#f5e6c8; border:none;
    border-radius:6px; padding:8px 20px; font-size:13px; font-family:inherit; cursor:pointer;
}
</style>
</head>
<body>
<div id="app"></div>

<script src="fate.js"></script>
<script>
// ==================== 游戏核心 ====================
let G = loadGame();

function defaultGame(){
    return {
        playerName: '无名',
        innateFate: null,
        awakenedFates: [],
        power: 0, cultivation: 0,
        skills: [],
        days: 1,
        totalActions: 0,
        actionLog: [],
        skillDays: [],
        logs: ['你来到了这个小山谷，一切从零开始...'],
        hasStarted: false,
        createdAt: Date.now(),
        lastSave: Date.now()
    };
}

function loadGame(){
    try{
        const s = localStorage.getItem('wuxiaValley');
        if(s) return JSON.parse(s);
    }catch(e){}
    return defaultGame();
}

function save(){
    G.lastSave = Date.now();
    try{ localStorage.setItem('wuxiaValley', JSON.stringify(G)); }catch(e){}
}

// ==================== 场景渲染 ====================
function render(){
    const app = document.getElementById('app');
    
    if(!G.innateFate){
        // 还没抽命格 → 先抽
        drawFateScreen();
        return;
    }
    
    const fate = G.innateFate;
    const rarityStars = {S:'⭐⭐⭐⭐⭐',A:'⭐⭐⭐⭐',B:'⭐⭐⭐',C:'⭐⭐',D:'⭐'};
    const rarityColors = {S:'#c0392b',A:'#d4a574',B:'#8b6914',C:'#5a7a3a',D:'#808080'};
    
    app.innerHTML = `
    <div class="top-bar">
        <div class="avatar">${G.playerName[0]||'无'}</div>
        <div class="player-info">
            <div class="player-name">${G.playerName}</div>
            <div class="player-fate" style="color:${rarityColors[fate.rarity]}">
                ${rarityStars[fate.rarity]} ${fate.name} — ${fate.desc}
                <span style="color:#a08060;margin-left:4px;font-size:10px;">
                    ${G.days}天 | 功力${fmt(G.power)}
                </span>
            </div>
        </div>
    </div>
    <div class="scene">
        <div class="scene-title">🏔️ 小山谷 · ${getSeason()}</div>
        <div class="scene-grid">
            <div class="scene-spot spot-1" onclick="openPlace('home')">
                <span class="icon">🏠</span>
                <span class="name">小 屋</span>
                <span class="hint">打坐·休息</span>
            </div>
            <div class="scene-spot spot-2" onclick="openPlace('practice')">
                <span class="icon">🪵</span>
                <span class="name">练功场</span>
                <span class="hint">练武·磨砺</span>
            </div>
            <div class="scene-spot spot-3" onclick="openPlace('fish')">
                <span class="icon">🎣</span>
                <span class="name">钓鱼台</span>
                <span class="hint">垂钓·休憩</span>
            </div>
            <div class="scene-spot spot-4" onclick="openPlace('mountain')">
                <span class="icon">🌲</span>
                <span class="name">后 山</span>
                <span class="hint">探索·采集</span>
            </div>
            <div class="scene-spot spot-5" onclick="openPlace('library')">
                <span class="icon">📚</span>
                <span class="name">藏书阁</span>
                <span class="hint">读书·悟道</span>
            </div>
            <div class="scene-spot spot-6" onclick="openPlace('gate')">
                <span class="icon">🚪</span>
                <span class="name">山 门</span>
                <span class="hint">出师·闯江湖</span>
            </div>
        </div>
    </div>
    <div class="log-box" id="logBox">
        ${G.logs.slice(-15).map(l => {
            const m = l.match(/\[(.+?)\]/);
            const t = m?m[1]:'';
            const txt = l.replace(/\[.+?\]\s*/,'');
            const cls = l.includes('✨')||l.includes('🎉')||l.includes('🏆')?'hl':l.includes('觉醒')?'ach':'';
            return `<div class="le"><span class="tm">[${t}]</span><span class="${cls}">${txt}</span></div>`;
        }).join('')}
    </div>
    <div id="panel"></div>
    `;
    
    // 检测后天命格
    checkFates();
}

function getSeason(){
    const m = ['春','夏','秋','冬'];
    return m[Math.floor((G.days % 360) / 90)] + '天 · 第' + G.days + '日';
}

function fmt(n){
    if(n>=10000) return (n/10000).toFixed(1)+'万';
    return Math.floor(n);
}

// ==================== 命格抽取 ====================
function drawFateScreen(){
    document.getElementById('app').innerHTML = `
    <div class="fate-draw-overlay">
        <div class="fate-card">
            <div style="font-size:48px;margin-bottom:12px;">🔮</div>
            <h2 style="font-size:20px;color:#2c1810;margin-bottom:8px;letter-spacing:4px;">天 命 已 定</h2>
            <p style="font-size:13px;color:#5a3a2a;margin-bottom:16px;">你的先天命格正在显现...</p>
            <button class="fate-btn" onclick="doDraw()">抽 取 命 格</button>
        </div>
    </div>`;
}

function doDraw(){
    const fate = drawInnateFate();
    G.innateFate = fate;
    G.hasStarted = true;
    
    const rarityColors = {S:'#c0392b',A:'#d4a574',B:'#8b6914',C:'#5a7a3a',D:'#808080'};
    const rarityStars = {S:'⭐⭐⭐⭐⭐',A:'⭐⭐⭐⭐',B:'⭐⭐⭐',C:'⭐⭐',D:'⭐'};
    const rarityNames = {S:'天 命',A:'绝 品',B:'上 品',C:'中 品',D:'凡 品'};
    
    document.getElementById('app').innerHTML = `
    <div class="fate-draw-overlay">
        <div class="fate-card" style="border-color:${rarityColors[fate.rarity]}">
            <div class="fate-rarity">${rarityStars[fate.rarity]}</div>
            <div style="font-size:12px;color:${rarityColors[fate.rarity]};letter-spacing:4px;margin-bottom:8px;">${rarityNames[fate.rarity]}</div>
            <div class="fate-name" style="color:${rarityColors[fate.rarity]}">${fate.name}</div>
            <div class="fate-desc">${fate.desc}</div>
            <div class="fate-extra">${fate.rarity === 'D' ? '💪 天道酬勤，后天的你必将不凡！' : '✨ 天赐良缘，好好把握！'}</div>
            <button class="fate-btn" onclick="startGame()">踏 入 江 湖</button>
        </div>
    </div>`;
    
    save();
}

function startGame(){
    G.logs.push(`✨ 你带着命格【${G.innateFate.name}】踏入了小山谷。`);
    save();
    render();
}

// ==================== 地点面板 ====================
function openPlace(place){
    const panel = document.getElementById('panel');
    if(!panel) return;
    
    const places = {
        home: {
            title: '🏠 小屋',
            content: `
                <p style="text-align:center;color:#5a3a2a;font-size:13px;margin-bottom:12px;">一间简朴的小屋，是你在这个山谷中的安身之所。</p>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                    <button class="practice-btn" style="font-size:12px;padding:10px;" onclick="doAct('打坐')">🧘 打坐修行</button>
                    <button class="practice-btn" style="font-size:12px;padding:10px;background:#5a7a3a;" onclick="doAct('休息')">😴 休息恢复</button>
                </div>
                <div class="practice-area">
                    <div class="practice-anim" id="actAnim">🧘</div>
                    <div class="practice-text" id="actText">静下心来，开始修炼...</div>
                </div>
            `
        },
        practice: {
            title: '🪵 练功场',
            content: `
                <p style="text-align:center;color:#5a3a2a;font-size:13px;margin-bottom:12px;">木人桩立在场地中央，等待你的磨砺。</p>
                <div class="skill-grid" id="skillGrid"></div>
                <div class="practice-area">
                    <div class="practice-anim" id="actAnim">👊</div>
                    <div class="practice-text" id="actText">选择一门武功开始修炼...</div>
                    <button class="practice-btn" id="practiceBtn" style="display:none;" onclick="doPractice()">开始练功</button>
                </div>
            `
        },
        fish: { title: '🎣 钓鱼台', content: `<p style="text-align:center;color:#5a3a2a;">钓鱼台正在建设中...</p>` },
        mountain: { title: '🌲 后山', content: `<p style="text-align:center;color:#5a3a2a;">后山正在建设中...</p>` },
        library: { title: '📚 藏书阁', content: `<p style="text-align:center;color:#5a3a2a;">藏书阁正在建设中...</p>` },
        gate: {
            title: '🚪 山门',
            content: `
                <p style="text-align:center;color:#5a3a2a;font-size:13px;margin-bottom:12px;">山门外就是广阔的江湖世界。</p>
                <p style="text-align:center;color:#8b6914;font-size:12px;margin-bottom:16px;">出师条件：功力达到5000 · 已觉醒命格≥3个</p>
                <div style="text-align:center;padding:16px;">
                    <span style="font-size:14px;color:#5a3a2a;">
                        功力: ${fmt(G.power)}/5000 | 命格: ${G.awakenedFates.length}/3
                    </span>
                </div>
                ${G.power >= 5000 && G.awakenedFates.length >= 3 ? `
                    <button class="practice-btn" style="width:100%;" onclick="doGraduate()">🎓 出师！闯荡江湖</button>
                ` : `
                    <p style="text-align:center;color:#a08060;font-size:12px;">还需继续修炼...</p>
                `}
            `
        }
    };
    
    const p = places[place];
    if(!p) return;
    
    panel.className = 'panel active';
    panel.innerHTML = `<span class="panel-back" onclick="closePanel()">← 返回</span>
        <div class="panel-title">${p.title}</div>${p.content}`;
    
    // 如果是练功场，渲染武功列表
    if(place === 'practice') renderSkills();
}

function closePanel(){
    document.getElementById('panel').className = 'panel';
}

// ==================== 武功系统 ====================
const SKILL_DATA = [
    { id:'basic_fist', name:'基础拳法', type:'拳掌', desc:'最基本的拳脚功夫', power:10, speed:10, cost:2, expPerAct:5 },
    { id:'taiji', name:'太极拳', type:'拳掌', desc:'以柔克刚，四两拨千斤', power:30, speed:8, cost:5, expPerAct:4 },
    { id:'eighteen_dragon', name:'降龙十八掌', type:'拳掌', desc:'天下至刚至阳的掌法', power:80, speed:4, cost:15, expPerAct:3 },
    { id:'basic_sword', name:'基础剑法', type:'剑法', desc:'剑术入门', power:12, speed:12, cost:3, expPerAct:5 },
    { id:'dggu', name:'独孤九剑', type:'剑法', desc:'破尽天下武学', power:70, speed:15, cost:12, expPerAct:3 },
    { id:'dark_iron', name:'玄铁剑法', type:'剑法', desc:'重剑无锋，大巧不工', power:90, speed:3, cost:18, expPerAct:2 },
    { id:'basic_blade', name:'基础刀法', type:'刀法', desc:'刀术入门', power:14, speed:10, cost:3, expPerAct:5 },
    { id:'hujia', name:'胡家刀法', type:'刀法', desc:'快准狠，刀刀致命', power:55, speed:12, cost:10, expPerAct:3 },
    { id:'green_dragon', name:'青龙刀法', type:'刀法', desc:'威猛霸道', power:75, speed:5, cost:14, expPerAct:2 },
    { id:'breath', name:'吐纳心法', type:'内功', desc:'调息养气，培元固本', power:0, speed:0, cost:0, expPerAct:6 },
    { id:'yijing', name:'易筋经', type:'内功', desc:'少林无上内功', power:0, speed:0, cost:0, expPerAct:3 },
    { id:'jiuyang', name:'九阳神功', type:'内功', desc:'内力生生不息', power:0, speed:0, cost:0, expPerAct:2 },
    { id:'basic_light', name:'基础轻功', type:'轻功', desc:'身法入门', power:0, speed:0, cost:0, expPerAct:6 },
    { id:'tiyun', name:'梯云纵', type:'轻功', desc:'武当轻功绝学', power:0, speed:0, cost:0, expPerAct:4 },
    { id:'lingbo', name:'凌波微步', type:'轻功', desc:'逍遥派无上身法', power:0, speed:0, cost:0, expPerAct:2 },
];

const MASTERY = ['初学乍练','粗通皮毛','略有小成','驾轻就熟','融会贯通','炉火纯青','登峰造极','出神入化','超凡入圣','返璞归真'];
const MAX_EXP = 5000;

function renderSkills(){
    const grid = document.getElementById('skillGrid');
    if(!grid) return;
    
    if(!G.skills || G.skills.length === 0){
        SKILL_DATA.forEach(s => {
            G.skills.push({id:s.id, exp:0, masteryLevel:0});
        });
    }
    
    grid.innerHTML = SKILL_DATA.map(s => {
        const gs = G.skills.find(x => x.id === s.id);
        const level = gs ? gs.masteryLevel : 0;
        const exp = gs ? gs.exp : 0;
        const progress = Math.min(100, (exp / MAX_EXP) * 100);
        return `<div class="skill-card" onclick="selectSkill('${s.id}')">
            <div class="sk-name">${s.name}</div>
            <div class="sk-type">${s.type} · 威力${s.power} · 速度${s.speed}</div>
            <div class="sk-lv">${MASTERY[level]} (${Math.floor(exp)}/${MAX_EXP})</div>
            <div class="sk-bar"><div class="sk-fill" style="width:${progress}%"></div></div>
        </div>`;
    }).join('');
}

let selectedSkill = null;
function selectSkill(id){
    selectedSkill = id;
    const s = SKILL_DATA.find(x => x.id === id);
    const btn = document.getElementById('practiceBtn');
    const text = document.getElementById('actText');
    const anim = document.getElementById('actAnim');
    if(btn) btn.style.display = 'inline-block';
    if(text) text.textContent = `你站到木人桩前，准备练习【${s.name}】...`;
    if(anim) anim.textContent = s.type === '内功' ? '🧘' : s.type === '轻功' ? '🏃' : '👊';
}

function doPractice(){
    if(!selectedSkill) return;
    const s = SKILL_DATA.find(x => x.id === selectedSkill);
    const gs = G.skills.find(x => x.id === selectedSkill);
    if(!s || !gs) return;
    
    if(gs.masteryLevel >= 9 && gs.exp >= MAX_EXP){
        document.getElementById('actText').textContent = '这门武功你已经练至化境，无需再练。';
        return;
    }
    
    // 修炼速度受先天命格影响
    let speedBonus = 1;
    if(G.innateFate?.effects?.cultSpeed) speedBonus = G.innateFate.effects.cultSpeed;
    if(G.innateFate?.effects?.soloBonus) speedBonus += G.innateFate.effects.soloBonus - 1;
    
    const gain = Math.floor(s.expPerAct * speedBonus * (0.8 + Math.random() * 0.4));
    gs.exp += gain;
    
    // 境界提升
    while(gs.masteryLevel < 9 && gs.exp >= (gs.masteryLevel + 1) * 500){
        gs.masteryLevel++;
        G.logs.push(`✨ 【${s.name}】突破至【${MASTERY[gs.masteryLevel]}】！`);
    }
    
    G.power += Math.floor(gain * (s.power / 20 || 1));
    G.days++;
    G.totalActions++;
    G.actionLog.push('练功');
    
    const descs = [
        '你扎稳马步，一拳一拳地练习',
        '你全神贯注，每一招都力求精准',
        '汗水浸透了衣衫，但你毫不在意',
        '你感觉对这门武功的理解又深了一层',
        '木人桩发出沉闷的撞击声，回荡在练功场上'
    ];
    document.getElementById('actText').textContent = descs[Math.floor(Math.random() * descs.length)] + ` 熟练度+${gain}`;
    
    // 检查命格
    checkFates();
    render();
    save();
}

// ==================== 小屋行动 ====================
function doAct(type){
    const anim = document.getElementById('actAnim');
    const text = document.getElementById('actText');
    
    if(type === '打坐'){
        anim.textContent = '🧘';
        const cultGain = Math.floor(5 + Math.random() * 10 + G.days * 0.1);
        G.cultivation += cultGain;
        G.power += Math.floor(cultGain * 0.3);
        G.days++;
        G.totalActions++;
        G.actionLog.push('打坐');
        text.textContent = `你盘膝而坐，五心朝天。内力在经脉中缓缓流转... 修为+${cultGain}`;
    } else if(type === '休息'){
        anim.textContent = '😴';
        G.days++;
        G.actionLog.push('休息');
        text.textContent = '你美美地睡了一觉，醒来神清气爽。';
    }
    
    checkFates();
    render();
    save();
}

// ==================== 后天命格检测 ====================
function checkFates(){
    if(!G.awakenedFates) G.awakenedFates = [];
    
    const latents = [
        {
            id:'tiandaochouqin', name:'天道酬勤', desc:'全修炼速度+20%',
            check: function(g) {
                const threshold = g.innateFate?.effects?.dayHalved ? 50 : 100;
                return g.days >= threshold && !g.awakenedFates.includes('tiandaochouqin');
            },
            effect: {cultSpeedAll:0.2}
        },
        {
            id:'xinshuruzhi', name:'心如止水', desc:'突破概率+20%',
            check: function(g) {
                const threshold = g.innateFate?.effects?.dayHalved ? 15 : 30;
                const recent = (g.actionLog || []).slice(-threshold);
                if(recent.length < threshold) return false;
                return recent.every(a => a === '打坐') && !g.awakenedFates.includes('xinshuruzhi');
            }
        }
    ];
    
    let newFates = [];
    latents.forEach(f => {
        if(f.check(G)){
            let prob = 1.0;
            if(G.innateFate?.effects?.latentMultiplier) prob *= G.innateFate.effects.latentMultiplier;
            if(Math.random() < prob){
                G.awakenedFates.push(f.id);
                newFates.push(f);
                G.logs.push(`🏆 觉醒后天命格：【${f.name}】— ${f.desc}`);
            }
        }
    });
    
    if(newFates.length > 0){
        save();
        setTimeout(() => showAlert(newFates), 500);
    }
}

function showAlert(fates){
    const html = fates.map(f => `
        <h3>🏆 命格觉醒</h3>
        <p style="font-size:18px;font-weight:700;color:#8b2500;margin:8px 0;">【${f.name}】</p>
        <p>${f.desc}</p>
    `).join('<hr style="border-color:#d4c5a9;margin:8px 0;">');
    
    const overlay = document.createElement('div');
    overlay.className = 'alert-overlay';
    overlay.innerHTML = `<div class="alert-box">${html}<button class="alert-btn" onclick="this.closest('.alert-overlay').remove()">继续修炼</button></div>`;
    document.body.appendChild(overlay);
}

// ==================== 初始化 ====================
function init(){
    render();
    save();
    setInterval(save, 30000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
