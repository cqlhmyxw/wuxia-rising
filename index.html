<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>武侠·崛起</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{
    background:#f5e6c8; color:#2c1810; font-family:STKaiti,KaiTi,Noto Serif SC,serif;
    min-height:100vh; overflow-x:hidden;
}
#app{ max-width:480px; margin:0 auto; min-height:100vh; }

/* 顶部 */
.top-bar{
    background:linear-gradient(180deg,#2c1810,#3d2415);
    padding:10px 14px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:10;
}
.avatar{
    width:44px;height:44px;border-radius:50%;
    background:linear-gradient(135deg,#8b2500,#c0392b);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;color:#f5e6c8;font-weight:700;border:2px solid #d4a574;flex-shrink:0;
}
.pname{ color:#f5e6c8; font-size:15px; font-weight:700; letter-spacing:2px; }
.pfate{ color:#d4a574; font-size:10px; margin-top:1px; }
.pstats{ display:flex; gap:6px; margin-top:2px; }
.pstats span{ color:#a08060; font-size:9px; }
.pstats span b{ color:#f5e6c8; font-weight:400; }

/* 场景 */
.scene{
    padding:12px; min-height:350px;
    background:linear-gradient(180deg,#87CEEB,#B0E0E6 30%,#90EE90 60%,#5a8a3a 100%);
    border-bottom:3px solid #2c1810;
}
.stitle{ text-align:center;font-size:13px;background:rgba(245,230,200,0.85);padding:3px 0;border-radius:4px;margin-bottom:10px; }
.sgrid{ display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px; }
.ss{
    background:rgba(245,230,200,0.88);border:2px solid #8b4513;border-radius:8px;
    padding:10px 4px;text-align:center;cursor:pointer;transition:all 0.15s;
    min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.ss:active{ transform:scale(0.95); }
.ss .ic{ font-size:24px; }
.ss .nm{ font-size:11px; color:#2c1810; font-weight:600; }
.s1{ grid-column:2; grid-row:1; }
.s2{ grid-column:1; grid-row:2; }
.s3{ grid-column:3; grid-row:2; }
.s4{ grid-column:2; grid-row:3; }
.s5{ grid-column:1; grid-row:1; }
.s6{ grid-column:3; grid-row:1; }

/* 面板 */
.panel{
    background:#fff8ef; border:1px solid #d4c5a9; border-radius:8px;
    margin:8px 12px; padding:14px; display:none;
}
.panel.show{ display:block; }
.ptitle{ font-size:15px; font-weight:700; text-align:center; padding-bottom:6px; border-bottom:1px solid #d4c5a9; margin-bottom:10px; }
.pback{ cursor:pointer; color:#8b2500; font-size:12px; float:left; margin-top:2px; }

/* 武功网格 */
.sg2{ display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:8px; }
.sc{
    background:#f5e6c8; border:1px solid #d4c5a9; border-radius:6px;
    padding:8px; cursor:pointer; transition:0.15s;
}
.sc:active{ background:#efe0bc; }
.sc .sn{ font-size:12px; font-weight:600; }
.sc .stp{ font-size:9px; color:#8b6914; }
.sc .slv{ font-size:10px; color:#2c1810; margin-top:3px; }
.sc .sbar{ width:100%; height:3px; background:#d4c5a9; border-radius:2px; margin-top:3px; overflow:hidden; }
.sc .sfill{ height:100%; background:#8b2500; border-radius:2px; transition:width 0.3s; }
.sc.active{ border-color:#8b2500; background:#efe0bc; }

/* 行动区 */
.act-area{ text-align:center; padding:12px 0; }
.act-circle{
    width:64px;height:64px;margin:0 auto 10px;
    background:#2c1810;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:30px; animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
.act-text{ font-size:12px; color:#5a3a2a; line-height:1.7; min-height:36px; margin-bottom:10px; }
.act-btn{
    background:#8b2500;color:#f5e6c8;border:none;border-radius:6px;
    padding:10px 28px;font-size:14px;font-family:inherit;letter-spacing:2px;
    cursor:pointer;transition:0.15s;
}
.act-btn:active{ transform:scale(0.95); background:#6b1d00; }
.act-btn:disabled{ opacity:0.4; }

/* 日志 */
.log-box{
    background:rgba(44,24,16,0.04); border-radius:6px;
    padding:8px; height:100px; overflow-y:auto;
    font-size:10px; line-height:1.6; margin:8px 12px;
}
.lg{ padding:1px 0; border-bottom:1px solid rgba(44,24,16,0.02); }
.lg .tm{ color:#a08060; }
.lg .hl{ color:#8b2500; }
.lg .ach{ color:#c0392b; font-weight:600; }

/* 弹窗 */
.modal-overlay{
    position:fixed;inset:0;background:rgba(44,24,16,0.85);z-index:100;
    display:flex;align-items:center;justify-content:center;
}
.modal{
    background:linear-gradient(135deg,#f5e6c8,#efe0bc);
    border:3px solid #8b2500;border-radius:12px;
    padding:24px 20px;max-width:320px;width:90%;text-align:center;
}
.modal h3{font-size:18px;color:#2c1810;margin-bottom:8px;letter-spacing:2px;}
.modal p{font-size:13px;color:#5a3a2a;line-height:1.6;}
.modal-btn{
    margin-top:12px;background:#8b2500;color:#f5e6c8;border:none;
    border-radius:6px;padding:8px 20px;font-size:13px;font-family:inherit;cursor:pointer;
}
</style>
<script src="skills.js"></script>
</head>
<body>
<div id="app"></div>
<script>
// ==================== 数据 ====================
const SKILLS = [
    {id:'f1',name:'基础拳法',type:'拳掌',desc:'入门拳脚功夫',pow:10,spd:10,expPer:5,ico:'👊'},
    {id:'f2',name:'太极拳',type:'拳掌',desc:'以柔克刚',pow:30,spd:8,expPer:4,ico:'☯️'},
    {id:'f3',name:'降龙十八掌',type:'拳掌',desc:'至刚至阳',pow:80,spd:4,expPer:3,ico:'🐉'},
    {id:'j1',name:'基础剑法',type:'剑法',desc:'剑术入门',pow:12,spd:12,expPer:5,ico:'⚔️'},
    {id:'j2',name:'独孤九剑',type:'剑法',desc:'破尽天下武学',pow:70,spd:15,expPer:3,ico:'🗡️'},
    {id:'j3',name:'玄铁剑法',type:'剑法',desc:'重剑无锋',pow:90,spd:3,expPer:2,ico:'⚫'},
    {id:'d1',name:'基础刀法',type:'刀法',desc:'刀术入门',pow:14,spd:10,expPer:5,ico:'🔪'},
    {id:'d2',name:'胡家刀法',type:'刀法',desc:'快准狠',pow:55,spd:12,expPer:3,ico:'🗡️'},
    {id:'d3',name:'青龙刀法',type:'刀法',desc:'威猛霸道',pow:75,spd:5,expPer:2,ico:'🐉'},
    {id:'n1',name:'吐纳心法',type:'内功',desc:'调息养气',pow:0,spd:0,expPer:6,ico:'🧘'},
    {id:'n2',name:'易筋经',type:'内功',desc:'少林内功',pow:0,spd:0,expPer:3,ico:'📿'},
    {id:'n3',name:'九阳神功',type:'内功',desc:'内力生生不息',pow:0,spd:0,expPer:2,ico:'☀️'},
    {id:'q1',name:'基础轻功',type:'轻功',desc:'身法入门',pow:0,spd:0,expPer:6,ico:'🏃'},
    {id:'q2',name:'梯云纵',type:'轻功',desc:'武当轻功',pow:0,spd:0,expPer:4,ico:'☁️'},
    {id:'q3',name:'凌波微步',type:'轻功',desc:'逍遥游身法',pow:0,spd:0,expPer:2,ico:'🌊'},
];
const LV = ['初学乍练','粗通皮毛','略有小成','驾轻就熟','融会贯通','炉火纯青','登峰造极','出神入化','超凡入圣','返璞归真'];
const MAX_EXP = 5000;

const FATES = [
    {id:'tl',name:'天灵根',rar:'S',w:1,desc:'修炼速度+50%'},
    {id:'hd',name:'混沌之体',rar:'S',w:1,desc:'全系可兼修'},
    {id:'jw',name:'绝世悟性',rar:'S',w:1,desc:'突破概率+30%'},
    {id:'tsl',name:'天生神力',rar:'A',w:5,desc:'基础攻击+20%'},
    {id:'fx',name:'福星高照',rar:'A',w:5,desc:'奇遇概率+50%'},
    {id:'bd',name:'百毒不侵',rar:'A',w:5,desc:'毒抗+80%'},
    {id:'gj',name:'钢筋铁骨',rar:'B',w:15,desc:'防御+20%'},
    {id:'sx',name:'神行百变',rar:'B',w:15,desc:'闪避+15%'},
    {id:'gm',name:'过目不忘',rar:'B',w:15,desc:'读书收益+30%'},
    {id:'ts',name:'天煞孤星',rar:'B',w:15,desc:'独修+30%，社交减半'},
    {id:'cy',name:'财运亨通',rar:'C',w:30,desc:'银两+30%'},
    {id:'lc',name:'灵蝉之息',rar:'C',w:30,desc:'内力恢复+25%'},
    {id:'tm',name:'天生魅骨',rar:'C',w:30,desc:'NPC好感+50%'},
    {id:'ft',name:'凡体',rar:'D',w:49,desc:'后天触发×2'},
    {id:'pa',name:'平平安安',rar:'D',w:49,desc:'免负面事件，后天×2'},
];

const STAR = {S:'⭐⭐⭐⭐⭐',A:'⭐⭐⭐⭐',B:'⭐⭐⭐',C:'⭐⭐',D:'⭐'};
const C_RAR = {S:'#c0392b',A:'#d4a574',B:'#8b6914',C:'#5a7a3a',D:'#808080'};

// ==================== 游戏状态 ====================
let G = loadGame();
let currentPlace = null;
let selectedSkill = null;

function defG(){
    return {
        name:'无名', innateFates:[], awakenedFates:[],
        power:0, cult:0, skills:[],
        days:1, acts:0, log:['你来到了小山谷...'],
        actLog:[], hasFate:false, lastSave:Date.now()
    };
}

function loadGame(){
    try{ const s=localStorage.getItem('wx'); if(s) return JSON.parse(s); }catch(e){}
    return defG();
}
function save(){ G.lastSave=Date.now(); try{localStorage.setItem('wx',JSON.stringify(G));}catch(e){} }

function fmt(n){ return n>=10000?(n/10000).toFixed(1)+'万':Math.floor(n); }
function rnd(a,b){ return a+Math.random()*(b-a); }

function drawFate(){ const p=[]; FATES.forEach(f=>{for(let i=0;i<f.w;i++)p.push(f);}); return p[Math.floor(Math.random()*p.length)]; }

// ==================== 渲染 ====================
function render(){
    const fateStr = G.innateFates.map(f => `<span style="color:${C_RAR[f.rar]}">${STAR[f.rar]}${f.name}</span>`).join(' · ');
    
    document.getElementById('app').innerHTML = `
    <div class="top-bar">
        <div class="avatar">${G.name[0]||'?'}</div>
        <div><div class="pname">${G.name}</div>
        <div class="pfate">${fateStr||'等待天命...'}</div>
        <div class="pstats">
            <span>功力 <b>${fmt(G.power)}</b></span>
            <span>修为 <b>${fmt(G.cult)}</b></span>
            <span>第<b>${G.days}</b>日</span>
            <span>命格<b>${G.awakenedFates.length}</b></span>
        </div></div>
    </div>
    <div class="scene">
        <div class="stitle">🏔️ 小山谷 · 第${G.days}日</div>
        <div class="sgrid">
            <div class="ss s1" onclick="openPlace('小屋')"><span class="ic">🏠</span><span class="nm">小屋</span></div>
            <div class="ss s2" onclick="openPlace('练功场')"><span class="ic">🪵</span><span class="nm">练功场</span></div>
            <div class="ss s3" onclick="openPlace('钓鱼台')"><span class="ic">🎣</span><span class="nm">钓鱼台</span></div>
            <div class="ss s4" onclick="openPlace('后山')"><span class="ic">🌲</span><span class="nm">后山</span></div>
            <div class="ss s5" onclick="openPlace('藏书阁')"><span class="ic">📚</span><span class="nm">藏书阁</span></div>
            <div class="ss s6" onclick="openPlace('出师')"><span class="ic">🚪</span><span class="nm">出师</span></div>
        </div>
    </div>
    <div class="log-box" id="lb">${G.log.slice(-15).map(l=>{
        const m=l.match(/\[(.+?)\]/); const t=m?m[1]:''; const txt=l.replace(/\[.+?\]\s*/,'');
        const cls=l.includes('✨')||l.includes('🏆')?'hl':l.includes('觉醒')?'ach':'';
        return `<div class="lg"><span class="tm">[${t}]</span><span class="${cls}">${txt}</span></div>`;
    }).join('')}</div>
    <div class="panel" id="panel"></div>`;
    
    // 如果之前有打开的面板，恢复
    if(currentPlace){ const p = document.getElementById('panel'); if(p && p.innerHTML) p.classList.add('show'); }
}

// ==================== 地点面板 ====================
function openPlace(place){
    currentPlace = place;
    const p = document.getElementById('panel');
    if(!p) return;
    
    let html = '';
    
    if(place === '小屋'){
        html = `<span class="pback" onclick="closeP()">← 返回</span>
        <div class="ptitle">🏠 小屋</div>
        <p style="text-align:center;color:#5a3a2a;font-size:13px;margin-bottom:10px;">一间简朴的小屋，你的安身之所。</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
            <button class="act-btn" style="font-size:12px;padding:8px;" onclick="doAct('打坐')">🧘 打坐</button>
            <button class="act-btn" style="font-size:12px;padding:8px;background:#5a7a3a;" onclick="doAct('休息')">😴 休息</button>
        </div>
        <div class="act-area">
            <div class="act-circle" id="ac">🧘</div>
            <div class="act-text" id="at">选择要做的事...</div>
        </div>`;
    }
    else if(place === '练功场'){
        if(!G.skills || G.skills.length===0){
            G.skills = SKILLS.map(s => ({id:s.id, exp:0, lv:0}));
        }
        selectedSkill = null;
        html = `<span class="pback" onclick="closeP()">← 返回</span>
        <div class="ptitle">🪵 练功场</div>
        <div class="sg2">${SKILLS.map(s=>{
            const gs = G.skills.find(x=>x.id===s.id)||{exp:0,lv:0};
            const pct = Math.min(100, ((gs.exp-gs.lv*500)/((gs.lv+1)*500-gs.lv*500))*100);
            return `<div class="sc" data-id="${s.id}" onclick="pickSkill('${s.id}')">
                <div class="sn">${s.ico} ${s.name}</div>
                <div class="stp">${s.type}·威力${s.pow}</div>
                <div class="slv">${LV[gs.lv]}【${Math.floor(((gs.exp-gs.lv*500)/((gs.lv+1)*500-gs.lv*500))*100)}%】</div>
                <div class="sbar"><div class="sfill" style="width:${((gs.exp-gs.lv*500)/((gs.lv+1)*500-gs.lv*500))*100}%"></div></div>
            </div>`;
        }).join('')}</div>
        <div class="act-area">
            <div class="act-circle" id="ac">👊</div>
            <div class="act-text" id="at">点击一门武功开始修炼...</div>
            <button class="act-btn" id="pb" style="display:none;" onclick="doPractice()">🖱️ 手动练功</button>
            <button class="act-btn" id="autoBtn" style="display:none;background:#5a7a3a;" onclick="toggleAutoPractice()">🤖 自动修炼</button>
            <div style="font-size:10px;color:#a08060;margin-top:6px;">💡 手动收益更高，可能触发顿悟！武功Lv.3后可自动修炼</div>
        </div>`;
    }
    else if(place === '钓鱼台'){
        html = `<span class="pback" onclick="closeP()">← 返回</span>
        <div class="ptitle">🎣 钓鱼台</div>
        <p style="text-align:center;color:#5a3a2a;font-size:13px;margin-bottom:10px;">碧波荡漾，是个静心垂钓的好地方。</p>
        <div class="act-area">
            <div class="act-circle" id="ac">🎣</div>
            <div class="act-text" id="at">水面平静，偶尔有鱼儿跃出...</div>
            <button class="act-btn" onclick="doFish()">🎣 开始钓鱼</button>
        </div>`;
    }
    else if(place === '后山'){
        html = `<span class="pback" onclick="closeP()">← 返回</span>
        <div class="ptitle">🌲 后山</div>
        <p style="text-align:center;color:#5a3a2a;font-size:13px;margin-bottom:10px;">山林幽深，分三个区域，越深入越危险。</p>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;">
            <button class="act-btn" style="font-size:11px;padding:6px;" onclick="enterArea('外围')">🌳 外围</button>
            <button class="act-btn" style="font-size:11px;padding:6px;" onclick="enterArea('深处')">🌲 深处</button>
            <button class="act-btn" style="font-size:11px;padding:6px;background:#8b2500;" onclick="enterArea('险地')">⛰️ 险地</button>
        </div>
        <div class="act-area">
            <div class="act-circle" id="ac">🌲</div>
            <div class="act-text" id="at" style="font-size:12px;">选择一个区域进入...</div>
            <div style="display:flex;gap:4px;margin-top:6px;">
                <button class="act-btn" id="atkBtn" style="display:none;font-size:11px;padding:6px;flex:1;" onclick="doBattle('attack')">⚔️ 攻击</button>
                <button class="act-btn" id="defBtn" style="display:none;font-size:11px;padding:6px;flex:1;background:#5a7a3a;" onclick="doBattle('defend')">🛡️ 防御</button>
                <button class="act-btn" id="runBtn" style="display:none;font-size:11px;padding:6px;flex:1;background:#a08060;" onclick="leaveBattle()">🏃 逃跑</button>
            </div>
        </div>`;
    }
    else if(place === '藏书阁'){
        html = `<span class="pback" onclick="closeP()">← 返回</span>
        <div class="ptitle">📚 藏书阁</div>
        <p style="text-align:center;color:#5a3a2a;font-size:13px;margin-bottom:10px;">架上书籍琳琅满目，等待有心人翻阅。</p>
        <div class="act-area">
            <div class="act-circle" id="ac">📖</div>
            <div class="act-text" id="at">选一本书来读...</div>
            <button class="act-btn" onclick="doRead()">📖 开始读书</button>
        </div>`;
    }
    else if(place === '出师'){
        const totalFates = (G.awakenedFates?.length||0) + (G.innateFates?.length||0);
        html = `<span class="pback" onclick="closeP()">← 返回</span>
        <div class="ptitle">🚪 山门</div>
        <p style="text-align:center;color:#5a3a2a;font-size:13px;margin-bottom:6px;">山门外就是广阔的江湖。</p>
        <p style="text-align:center;color:#8b6914;font-size:12px;margin-bottom:12px;">
            出师条件：功力5000 | 命格觉醒≥3个
        </p>
        <p style="text-align:center;font-size:13px;color:#2c1810;">
            功力：${fmt(G.power)}/5000 | 命格：${totalFates}/6
        </p>
        ${G.power>=5000&&totalFates>=6?`<button class="act-btn" style="width:100%;margin-top:12px;" onclick="doGraduate()">🎓 出师！</button>`:`<p style="text-align:center;color:#a08060;font-size:11px;margin-top:8px;">还需继续修炼...</p>`}`;
    }
    
    p.innerHTML = html;
    p.classList.add('show');
}

function closeP(){ 
    document.getElementById('panel').classList.remove('show'); 
    currentPlace = null;
}

// ==================== 修炼核心系统 ====================

function pickSkill(id){
    selectedSkill = id;
    const s = SKILLS.find(x=>x.id===id);
    const btn = document.getElementById('pb');
    const autoBtn = document.getElementById('autoBtn');
    const t = document.getElementById('at');
    const a = document.getElementById('ac');
    if(btn){ btn.style.display='inline-block'; }
    if(autoBtn){
        const canAuto = canAutoPractice(id);
        autoBtn.style.display = canAuto ? 'inline-block' : 'none';
        autoBtn.textContent = '🤖 自动修炼';
        autoBtn.style.background = '#5a7a3a';
    }
    if(t) t.textContent = `准备练习【${s.name}】...`;
    if(a) a.textContent = s.ico||'👊';
    document.querySelectorAll('.sc').forEach(el=>el.classList.remove('active'));
    const el = document.querySelector(`.sc[data-id="${id}"]`);
    if(el) el.classList.add('active');
}

// 手动修炼触发事件表
const PRACTICE_EVENTS = [
    { name:'正常修炼', prob:0.70, mult:1.0, msg:'你专注地练习着...' },
    { name:'灵光乍现', prob:0.15, mult:3.0, msg:'💡 脑海中灵光一闪！对这一招的理解突然加深了！' },
    { name:'融会贯通', prob:0.08, mult:5.0, msg:'✨ 以前不通之处，今日豁然开朗！' },
    { name:'天人感应', prob:0.05, mult:8.0, msg:'🌌 进入忘我境界，与天地共鸣！' },
    { name:'顿悟', prob:0.015, mult:15.0, msg:'🌟 大彻大悟！武学境界突飞猛进！' },
    { name:'天道酬勤·触发', prob:0.005, mult:30.0, msg:'☀️ 天道酬勤！你的努力感动了上天！' },
];

// 手动修炼
function doPractice(){
    if(!selectedSkill){
        const at = document.getElementById('at');
        if(at) at.innerHTML = '⚠️ 请先选择一门武功！<br><span style="font-size:11px;color:#8b6914;">点击上方武功卡片即可选择</span>';
        return;
    }
    const s = SKILLS.find(x=>x.id===selectedSkill);
    let gs = G.skills.find(x=>x.id===selectedSkill);
    if(!s||!gs){
        const at = document.getElementById('at');
        if(at) at.textContent = '⚠️ 武功数据异常，请重新选择。';
        return;
    }
    if(gs.lv>=9&&gs.exp>=MAX_EXP){
        document.getElementById('at').textContent = '此功已至化境，无需再练。'; return;
    }
    
    // 基础收益
    let bonus = 1;
    if(G.innateFates.some(f=>f.id==='tl')) bonus += 0.5;
    if(G.innateFates.some(f=>f.id==='ts')) bonus += 0.3;
    if(G.awakenedFates.includes('tdcq')) bonus += 0.2;
    
    // 手动修炼固定1.5倍
    bonus *= 1.5;
    
    // 抽取随机事件
    let mult = 1;
    let eventMsg = '';
    let r = Math.random();
    let cum = 0;
    for(const ev of PRACTICE_EVENTS){
        cum += ev.prob;
        if(r < cum){ mult = ev.mult; eventMsg = ev.msg; break; }
    }
    
    const gain = Math.floor(s.expPer * bonus * mult * rnd(0.9,1.1));
    gs.exp += gain;
    while(gs.lv<9 && gs.exp>=(gs.lv+1)*500){ 
        gs.lv++; 
        // 每次突破，增加人物属性
        const lvBonus = 10 + gs.lv * 5;
        G.power += lvBonus;
        G.cult += Math.floor(lvBonus * 0.5);
        addLog(`✨【${s.name}】突破至【${LV[gs.lv]}】— 功力+${lvBonus}，修为+${Math.floor(lvBonus*0.5)}`);
    }
    G.power += Math.floor(gain*(s.pow/12||1));
    G.cult += Math.floor(gain*0.3);
    G.days++; G.acts++; G.actLog.push('练功');
    
    const td = document.getElementById('at');
    if(eventMsg){
        td.innerHTML = `${eventMsg}<br><span style="color:#8b2500;font-size:16px;font-weight:700;">熟练度 +${gain}（×${mult}）</span>`;
        if(mult>=8) showModal('🌟 天赐机缘！', eventMsg.replace(/[💡✨🌌🌟☀️]/g,''));
    } else {
        td.innerHTML = `${['专注练习','一招一式反复打磨','力求每个动作精准','调息运气，连贯使出'][Math.floor(Math.random()*4)]}...<br>熟练度 +${gain}`;
    }
    
    // 经验条动画+卡片状态刷新
    const bar = document.querySelector(`.sc[data-id="${selectedSkill}"] .sfill`);
    if(bar){
        const pct2 = Math.min(100, ((gs.exp-gs.lv*500)/((gs.lv+1)*500-gs.lv*500))*100);
        bar.style.width = pct2+'%';
    }
    // 刷新当前武功卡片的境界显示（当前层百分比）
    const lvEl = document.querySelector(`.sc[data-id="${selectedSkill}"] .slv`);
    if(lvEl) lvEl.textContent = `${LV[gs.lv]}【${Math.floor(((gs.exp-gs.lv*500)/((gs.lv+1)*500-gs.lv*500))*100)}%】`;
    // 刷新练功场按钮状态
    const pb = document.getElementById('pb');
    if(pb) pb.textContent = `🖱️ 手动练功 (熟练度 +${Math.floor(s.expPer * bonus * rnd(0.9,1.1))})`;
    
    checkFates(); save();
}

// 检查是否可自动修炼
function canAutoPractice(skillId){
    const gs = G.skills.find(x=>x.id===skillId);
    if(!gs) return false;
    const s = SKILLS.find(x=>x.id===skillId);
    if(!s) return false;
    // 基础武功Lv3可自动，高级武功Lv5可自动
    const basicTypes = ['拳掌','剑法','刀法'];
    const threshold = basicTypes.includes(s.type) ? 3 : 5;
    return gs.lv >= threshold && gs.lv < 9;
}

// 自动修炼（每3秒执行一次）
let autoTimer = null;
function toggleAutoPractice(){
    if(autoTimer){
        clearInterval(autoTimer); autoTimer = null;
        document.getElementById('autoBtn').textContent = '🤖 自动修炼';
        document.getElementById('autoBtn').style.background = '#5a7a3a';
        return;
    }
    if(!selectedSkill || !canAutoPractice(selectedSkill)){
        if(!selectedSkill) alert('请先选择一门武功');
        else alert('此武功需要达到「略有小成」才可自动修炼');
        return;
    }
    document.getElementById('autoBtn').textContent = '⏹ 停止自动';
    document.getElementById('autoBtn').style.background = '#8b2500';
    
    autoTimer = setInterval(() => {
        if(!selectedSkill || !canAutoPractice(selectedSkill)){
            clearInterval(autoTimer); autoTimer = null;
            document.getElementById('autoBtn').textContent = '🤖 自动修炼';
            document.getElementById('autoBtn').style.background = '#5a7a3a';
            return;
        }
        // 自动修炼收益是手动的0.8倍，无随机事件
        const s = SKILLS.find(x=>x.id===selectedSkill);
        let gs = G.skills.find(x=>x.id===selectedSkill);
        if(!s||!gs){
        const at = document.getElementById('at');
        if(at) at.textContent = '⚠️ 武功数据异常，请重新选择。';
        return;
    }
        let bonus = 1;
        if(G.innateFates.some(f=>f.id==='tl')) bonus += 0.5;
        if(G.awakenedFates.includes('tdcq')) bonus += 0.2;
        bonus *= 0.8; // 自动倍率
        const gain = Math.floor(s.expPer * bonus * rnd(0.8,1.0));
        gs.exp += gain;
        while(gs.lv<9 && gs.exp>=(gs.lv+1)*500){ gs.lv++; addLog(`✨【${s.name}】突破至【${LV[gs.lv]}】`); }
        G.power += Math.floor(gain*(s.pow/15||1));
        G.days++; G.acts++;
        // 更新进度条
        const bar = document.querySelector(`.sc[data-id="${selectedSkill}"] .sfill`);
        if(bar) bar.style.width = Math.min(100, gs.exp/MAX_EXP*100)+'%';
        save();
    }, 3000);
}

// 离线挂机收益
function checkOffline(){
    const now = Date.now();
    const elapsed = now - (G.lastSave || now);
    if(elapsed < 60000) return; // 少于1分钟不计
    const offlineMins = Math.floor(elapsed / 60000);
    const maxMins = 480; // 最多离线8小时
    const mins = Math.min(offlineMins, maxMins);
    if(mins < 2) return;
    
    // 离线挂机收益
    let totalPower = 0, totalCult = 0;
    G.skills.forEach(gs => {
        if(gs.lv >= 3){ // 只有可自动修炼的武功才有离线收益
            const s = SKILLS.find(x=>x.id===gs.id);
            if(s){
                const gain = Math.floor(s.expPer * 0.4 * mins * rnd(0.8,1.0));
                gs.exp += gain;
                totalPower += Math.floor(gain*(s.pow/20||1));
                while(gs.lv<9 && gs.exp>=(gs.lv+1)*500){ gs.lv++; addLog(`✨离线修炼：【${s.name}】突破至【${LV[gs.lv]}】`); }
            }
        }
    });
    // 基础打坐离线收益
    const cultGain = Math.floor(mins * 2 * rnd(0.8,1.2));
    G.cult += cultGain;
    G.power += Math.floor(cultGain * 0.2);
    G.days += Math.floor(mins / 5); // 每5分钟算一天
    
    if(totalPower > 0 || cultGain > 0){
        addLog(`⏰ 离线修炼归来（${mins}分钟）：功力+${Math.floor(totalPower+cultGain*0.2)}，修为+${cultGain}`);
        showModal('⏰ 离线修炼归来', `你离开了${mins}分钟，但修炼从未停止。<br>功力 +${Math.floor(totalPower+cultGain*0.2)}<br>修为 +${cultGain}`);
    }
}

let currentMonster = null;
let inBattle = false;

function enterArea(area){
    const mPool = MONSTERS[area];
    currentMonster = {...mPool[Math.floor(Math.random()*mPool.length)]};
    currentMonster.maxHp = currentMonster.hp;
    inBattle = true;
    
    document.getElementById('at').innerHTML = 
        `你进入了【${area}】，遇到一只${currentMonster.ico}${currentMonster.name}！<br>` +
        `<span style="font-size:11px;color:#8b2500;">${currentMonster.name} HP:${currentMonster.hp}/${currentMonster.maxHp} 攻击:${currentMonster.atk}</span>`;
    document.getElementById('ac').textContent = currentMonster.ico;
    document.getElementById('atkBtn').style.display = 'inline-block';
    document.getElementById('defBtn').style.display = 'inline-block';
    document.getElementById('runBtn').style.display = 'inline-block';
    // 隐藏探索按钮
}

function doBattle(action){
    if(!inBattle || !currentMonster) return;
    
    // 玩家攻击力 = 基础 + 功力加成
    const playerAtk = 5 + Math.floor(G.power / 100);
    // 防守加成
    const defBonus = action === 'defend' ? 2.0 : 1.0;
    
    // 玩家攻击
    let dmg = Math.floor((playerAtk + Math.random() * playerAtk) / defBonus);
    currentMonster.hp -= dmg;
    if(currentMonster.hp < 0) currentMonster.hp = 0;
    
    let log = `⚔️ 你对${currentMonster.ico}${currentMonster.name}造成了${dmg}点伤害！`;
    
    if(currentMonster.hp > 0){
        // 怪物反击
        let monsterDmg = Math.floor(currentMonster.atk * (0.5 + Math.random() * 0.5));
        if(action === 'defend') monsterDmg = Math.floor(monsterDmg * 0.3);
        G.power -= monsterDmg;
        if(G.power < 0) G.power = 0;
        log += `<br>${currentMonster.ico}${currentMonster.name}反击造成${monsterDmg}点伤害！`;
        log += `<br><span style="font-size:11px;color:#8b2500;">${currentMonster.name} HP:${currentMonster.hp}/${currentMonster.maxHp}</span>`;
        log += `<br><span style="font-size:11px;color:#2c1810;">你的功力:${G.power}</span>`;
    } else {
        // 击杀奖励
        const exp = currentMonster.expG;
        G.power += exp;
        G.cult += Math.floor(exp * 0.5);
        G.days++;
        G.acts++;
        G.actLog.push('杀怪');
        addLog(`⚔️ 击杀${currentMonster.name} 功力+${exp} 修为+${Math.floor(exp*0.5)}`);
        
        // 掉落检测
        let dropMsg = '';
        if(Math.random() < currentMonster.dropRate){
            dropMsg = `<br>🎁 掉落：${currentMonster.drop}`;
            G.cult += exp * 0.3;
        }
        
        log += `<br>💀 ${currentMonster.name}倒下了！功力+${exp}${dropMsg}`;
        inBattle = false;
        currentMonster = null;
        document.getElementById('atkBtn').style.display = 'none';
        document.getElementById('defBtn').style.display = 'none';
        document.getElementById('runBtn').style.display = 'none';
    }
    
    const td = document.getElementById('at');
    td.innerHTML = log;
    save();
}

function leaveBattle(){
    if(!inBattle) return;
    addLog(`🏃 从${currentMonster.name}面前逃走了`);
    inBattle = false;
    currentMonster = null;
    document.getElementById('at').innerHTML = '你匆匆逃出了后山...';
    document.getElementById('ac').textContent = '😰';
    document.getElementById('atkBtn').style.display = 'none';
    document.getElementById('defBtn').style.display = 'none';
    document.getElementById('runBtn').style.display = 'none';

    save();
}

// ==================== 命格 ====================
function checkFates(){
    if(!G.awakenedFates) G.awakenedFates=[];
    
    // 天道酬勤
    if(G.days>=100 && !G.awakenedFates.includes('tdcq')){
        let prob = 1;
        if(G.innateFates.some(f=>f.id==='ft'||f.id==='pa')) prob = 2;
        if(Math.random()<prob){
            G.awakenedFates.push('tdcq');
            addLog('🏆 觉醒命格：【天道酬勤】— 全修炼速度+20%');
            showModal('🏆 命格觉醒','【天道酬勤】<br>天道酬勤，你的坚持终于得到了回报。<br>全修炼速度+20%');
        }
    }
    // 心如止水
    if(G.days>=30 && !G.awakenedFates.includes('xrsz')){
        const recent = G.actLog.slice(-30);
        if(recent.length>=30 && recent.every(a=>a==='打坐')){
            let prob = 0.8;
            if(G.innateFates.some(f=>f.id==='ft'||f.id==='pa')) prob = 1;
            if(Math.random()<prob){
                G.awakenedFates.push('xrsz');
                addLog('🏆 觉醒命格：【心如止水】— 突破概率+20%');
                showModal('🏆 命格觉醒','【心如止水】<br>连续三十日打坐，心静如水。<br>突破概率+20%');
            }
        }
    }
}

function addLog(t){ 
    G.log.push(`[第${G.days}日] ${t}`);
    if(G.log.length>100) G.log=G.log.slice(-100);
}

function showModal(title,msg){
    const ov = document.createElement('div');
    ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal"><h3>${title}</h3><p>${msg}</p><button class="modal-btn" onclick="this.closest(\'.modal-overlay\').remove()">知道了</button></div>`;
    document.body.appendChild(ov);
}

// ==================== 初始化 ====================
function init(){
    // 检测离线收益
    checkOffline();
    
    if(!G.innateFates||G.innateFates.length===0){
        // 抽取3个先天命格
        const fates = [];
        const order = {S:0,A:1,B:2,C:3,D:4};
        for(let i=0;i<3;i++) fates.push(drawFate());
        fates.sort((a,b)=>order[a.rar]-order[b.rar]);
        G.innateFates = fates;
        
        document.getElementById('app').innerHTML = `
        <div class="modal-overlay">
            <div class="modal">
                <h3>🔮 你的天命</h3>
                ${fates.map(f=>`<div style="margin:8px 0;padding:8px;border:1px solid ${C_RAR[f.rar]};border-radius:6px;">
                    <span style="color:${C_RAR[f.rar]}">${STAR[f.rar]}</span>
                    <span style="font-size:16px;font-weight:700;">${f.name}</span>
                    <p style="font-size:12px;color:#5a3a2a;">${f.desc}</p>
                </div>`).join('')}
                <button class="modal-btn" onclick="startGame()">踏入江湖</button>
            </div>
        </div>`;
    } else {
        render();
    }
    save();
    setInterval(save,30000);
}

function startGame(){
    render();
    save();
}

document.addEventListener('DOMContentLoaded',init);
