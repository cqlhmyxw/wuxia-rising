<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<style> *{ -webkit-tap-highlight-color:transparent; } </style>
<title>武侠·崛起</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{
    background:#0d0806; color:#d4c5a9;
    font-family:'STKaiti','KaiTi','Noto Serif SC',serif;
    min-height:100vh; overflow-x:hidden;
    background-image:
        radial-gradient(ellipse at 50% 0%, rgba(100,50,20,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(50,30,15,0.1) 0%, transparent 50%);
    display:flex; justify-content:center;
}
#app{ width:100%; max-width:420px; min-height:100vh; padding:0 14px 120px; position:relative; }

/* === 水墨动画背景 === */
#bgCanvas{
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:0; pointer-events:none; opacity:0.3;
}

/* === 顶部 === */
.top-bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 0 8px; position:relative; z-index:2;
}
.top-bar .title{
    font-size:20px; font-weight:700; letter-spacing:4px;
    background:linear-gradient(135deg, #f0d6a8, #d4a574);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.top-bar .version{
    font-size:10px; color:#5a4a3a; background:rgba(212,197,169,0.05);
    padding:2px 8px; border-radius:4px; border:1px solid rgba(212,197,169,0.08);
}

/* === 人物立绘区 === */
.portrait-area{
    position:relative; z-index:2; text-align:center;
    margin:0 -14px; padding:20px 0;
    background:linear-gradient(180deg, rgba(212,165,116,0.03) 0%, transparent 100%);
    border-top:1px solid rgba(212,197,169,0.05);
    border-bottom:1px solid rgba(212,197,169,0.05);
    overflow:hidden;
}
.portrait-container{
    position:relative; width:140px; height:160px; margin:0 auto;
}
.portrait-figure{
    width:100%; height:100%; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:64px; transition:all 0.5s ease;
    position:relative; z-index:2;
}
.portrait-glow{
    position:absolute; inset:-15px; border-radius:50%;
    background:conic-gradient(from 0deg, transparent, rgba(212,165,116,0.1), transparent, rgba(212,165,116,0.1), transparent);
    animation:glowSpin 4s linear infinite;
    z-index:1;
}
@keyframes glowSpin{ 100%{ transform:rotate(360deg); } }
.portrait-name{ font-size:18px; font-weight:700; margin-top:8px; letter-spacing:2px; }
.portrait-title{ font-size:12px; color:#8a7a6a; margin-top:2px; letter-spacing:3px; }

/* === 境界进度 === */
.realm-section{
    position:relative; z-index:2; padding:16px 0; text-align:center;
}
.realm-badge{
    display:inline-flex; align-items:center; gap:10px;
    padding:8px 20px; border-radius:20px; font-size:14px;
    border:1px solid; letter-spacing:2px;
}
.progress-container{ padding:16px 0 8px; }
.progress-label{
    display:flex; justify-content:space-between; font-size:11px;
    color:#6a5a4a; margin-bottom:6px;
}
.progress-track{
    width:100%; height:8px; background:rgba(212,197,169,0.06);
    border-radius:4px; overflow:hidden;
}
.progress-fill{
    height:100%; border-radius:4px;
    background:linear-gradient(90deg, #8a6a4a, #d4a574, #f0d6a8);
    transition:width 0.5s ease; width:0%;
    box-shadow:0 0 10px rgba(212,165,116,0.3);
}

/* === 属性面板 === */
.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; position:relative; z-index:2; margin:16px 0; }
.stat-item{
    background:rgba(212,197,169,0.02); border:1px solid rgba(212,197,169,0.06);
    border-radius:10px; padding:10px 4px; text-align:center;
}
.stat-item .s-icon{ font-size:16px; }
.stat-item .s-val{ font-size:16px; font-weight:700; margin-top:2px; }
.stat-item .s-lbl{ font-size:9px; color:#6a5a4a; margin-top:2px; }

/* === 武功 === */
.section-title{
    font-size:13px; color:#8a7a6a; letter-spacing:3px;
    margin:16px 0 8px; position:relative; z-index:2;
}
.section-title::after{
    content:''; display:block; width:40px; height:1px;
    background:rgba(212,197,169,0.15); margin-top:4px;
}
.skills{
    display:grid; grid-template-columns:1fr 1fr; gap:8px; position:relative; z-index:2;
}
.skill-card{
    background:rgba(212,197,169,0.02); border:1px solid rgba(212,197,169,0.08);
    border-radius:10px; padding:12px; cursor:pointer; transition:all 0.2s;
}
.skill-card:active{ transform:scale(0.96); background:rgba(212,197,169,0.06); }
.skill-card .sk-icon{ font-size:24px; margin-bottom:6px; }
.skill-card .sk-name{ font-size:13px; font-weight:600; letter-spacing:1px; }
.skill-card .sk-desc{ font-size:10px; color:#6a5a4a; margin-top:4px; }
.skill-card .sk-gain{ font-size:10px; color:#d4a574; margin-top:4px; }
.skill-card .sk-cd{ font-size:9px; color:#5a4a3a; margin-top:2px; }
.skill-card.locked{ opacity:0.4; }

/* === 日志 === */
.log-section{ position:relative; z-index:2; margin-top:16px; }
.log-box{
    background:rgba(0,0,0,0.15); border-radius:10px;
    padding:10px; height:150px; overflow-y:auto; font-size:11px; line-height:1.8;
}
.log-box::-webkit-scrollbar{ width:2px; }
.log-box::-webkit-scrollbar-thumb{ background:rgba(212,197,169,0.15); border-radius:2px; }
.le{ border-bottom:1px solid rgba(212,197,169,0.03); padding:2px 0; }
.le .tm{ color:#4a3a2a; }
.le .hl{ color:#f0d6a8; }
.le .ach{ color:#ffd700; }

/* === 浮动文字 === */
@keyframes floatUp{
    0%{ opacity:1; transform:translateY(0) scale(1); }
    100%{ opacity:0; transform:translateY(-80px) scale(1.3); }
}
.floating{
    position:fixed; pointer-events:none; z-index:999;
    font-size:20px; font-weight:700; letter-spacing:2px;
    animation:floatUp 1.8s ease-out forwards;
}

/* === 弹窗 === */
.modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100;
    display:flex; align-items:center; justify-content:center;
    animation:fadeIn 0.3s ease; backdrop-filter:blur(4px);
}
@keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
.modal{
    background:#18120e; border:1px solid rgba(212,165,116,0.25);
    border-radius:16px; padding:28px 20px; max-width:320px; width:90%;
    text-align:center; animation:modalIn 0.3s ease;
}
@keyframes modalIn{ from{ transform:scale(0.95); opacity:0; } to{ transform:scale(1); opacity:1; } }
.modal .m-icon{ font-size:48px; margin-bottom:12px; }
.modal h2{ font-size:18px; margin-bottom:8px; letter-spacing:2px; }
.modal p{ font-size:13px; color:#a08a70; line-height:1.7; margin-bottom:16px; }
.modal-btn{
    padding:10px 32px; border:1px solid rgba(212,165,116,0.3);
    border-radius:8px; background:rgba(212,165,116,0.08);
    color:#d4c5a9; font-family:inherit; font-size:14px; letter-spacing:2px;
    cursor:pointer; transition:all 0.2s;
}
.modal-btn:active{ background:rgba(212,165,116,0.15); transform:scale(0.96); }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div id="app">
    <div class="top-bar">
        <div class="title">⚔️ 武侠·崛起</div>
        <div class="version">v1.2</div>
    </div>

    <!-- 人物立绘 -->
    <div class="portrait-area">
        <div class="portrait-container">
            <div class="portrait-glow"></div>
            <div class="portrait-figure" id="portraitFigure">🧘</div>
        </div>
        <div class="portrait-name" id="portraitName">无名少年</div>
        <div class="portrait-title" id="portraitTitle">初入江湖</div>
    </div>

    <!-- 境界进度 -->
    <div class="realm-section">
        <div class="realm-badge" id="realmBadge" style="border-color:#8a7a6a40;color:#8a7a6a">
            🌱 初入江湖
        </div>
        <div class="progress-container">
            <div class="progress-label">
                <span id="progressCurrent">功力 0</span>
                <span id="progressNext">下一境: 100</span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        </div>
    </div>

    <!-- 属性 -->
    <div class="stats">
        <div class="stat-item"><div class="s-icon">⚡</div><div class="s-val" id="sPower">0</div><div class="s-lbl">功力</div></div>
        <div class="stat-item"><div class="s-icon">🧘</div><div class="s-val" id="sCult">0</div><div class="s-lbl">修为</div></div>
        <div class="stat-item"><div class="s-icon">📅</div><div class="s-val" id="sDays">1</div><div class="s-lbl">天数</div></div>
        <div class="stat-item"><div class="s-icon">🏆</div><div class="s-val" id="sAch">0</div><div class="s-lbl">成就</div></div>
    </div>

    <!-- 武功修炼 -->
    <div class="section-title">📜 修炼功法</div>
    <div class="skills" id="skillsList"></div>

    <!-- 日志 -->
    <div class="log-section">
        <div class="section-title">📖 修炼日志</div>
        <div class="log-box" id="logBox"><div class="le">初入江湖，一切从零开始...</div></div>
    </div>
</div>

<script>
// ======== 水墨背景 ========
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
}
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

class Particle{
    constructor(){
        this.reset();
    }
    reset(){
        this.x = Math.random() * canvas.width;
        this.y = -10;
        this.size = Math.random() * 3 + 1;
        this.speed = Math.random() * 0.3 + 0.1;
        this.alpha = Math.random() * 0.3 + 0.1;
        this.waver = Math.random() * Math.PI * 2;
    }
    update(){
        this.y += this.speed;
        this.waver += 0.01;
        this.x += Math.sin(this.waver) * 0.3;
        if(this.y > canvas.height + 10) this.reset();
    }
    draw(){
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,150,120,${this.alpha})`;
        ctx.fill();
    }
}
const particles = Array.from({length:30}, ()=>new Particle());
function animateBg(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{ p.update(); p.draw(); });
    requestAnimationFrame(animateBg);
}
animateBg();

// ======== 游戏数据 ========
const REALMS = [
    { name:'初入江湖', minPower:0, icon:'🌱', emoji:'🧘', title:'无名少年', color:'#8a7a6a' },
    { name:'后起之秀', minPower:100, icon:'🌿', emoji:'🏃', title:'习武少年', color:'#a08a70' },
    { name:'小有名气', minPower:500, icon:'🌳', emoji:'⚔️', title:'武林新丁', color:'#c4a882' },
    { name:'武林新秀', minPower:2000, icon:'🔥', emoji:'🤺', title:'少年英侠', color:'#d4a574' },
    { name:'江湖高手', minPower:8000, icon:'⚡', emoji:'🦅', title:'江湖豪侠', color:'#e8c088' },
    { name:'一代宗师', minPower:25000, icon:'💫', emoji:'🐉', title:'一代宗师', color:'#f0d6a8' },
    { name:'武林泰斗', minPower:60000, icon:'🌌', emoji:'🐲', title:'武林泰斗', color:'#ffd700' },
    { name:'绝世高手', minPower:150000, icon:'☀️', emoji:'🗡️', title:'绝世剑仙', color:'#ffaa00' },
    { name:'陆地神仙', minPower:500000, icon:'👁️', emoji:'🧙', title:'陆地神仙', color:'#ff8800' },
    { name:'破碎虚空', minPower:1500000, icon:'🌀', emoji:'🌪️', title:'破碎虚空', color:'#ff4400' },
];

const SKILLS = [
    { id:'meditate', name:'吐纳心法', icon:'🧘', desc:'静心凝神，调理内息', unlock:0, gain:(g)=>({power:0,cult:5+Math.floor(Math.random()*10+g*0.1)}), cd:0, cdMax:0 },
    { id:'practice', name:'基础拳法', icon:'👊', desc:'扎马步，练拳法', unlock:0, gain:(g)=>({power:8+Math.floor(Math.random()*12+g*0.05),cult:2}), cd:0, cdMax:0 },
    { id:'enlighten', name:'参悟大道', icon:'📖', desc:'研读道经，以求顿悟', unlock:1, gain:(g)=>({power:5+Math.floor(Math.random()*8),cult:10+Math.floor(Math.random()*20+g*0.2)}), cd:0, cdMax:3 },
    { id:'adventure', name:'云游四海', icon:'🌄', desc:'走遍山川，寻求奇遇', unlock:2, gain:(g)=>({power:20+Math.floor(Math.random()*30),cult:8+Math.floor(Math.random()*15)}), cd:0, cdMax:5 },
    { id:'sword', name:'独孤九剑', icon:'⚔️', desc:'剑法精髓，破尽天下武学', unlock:3, gain:(g)=>({power:50+Math.floor(Math.random()*60+g*0.1),cult:15}), cd:0, cdMax:8 },
    { id:'inner', name:'易筋经', icon:'🌀', desc:'少林无上内功，脱胎换骨', unlock:5, gain:(g)=>({power:30+Math.floor(Math.random()*40),cult:40+Math.floor(Math.random()*50+g*0.3)}), cd:0, cdMax:10 },
];

const ADVENTURES = [
    { text:'在瀑布下悟道，修为大进！', p:0, c:30 },
    { text:'击败山贼，为民除害！', p:25, c:5 },
    { text:'得高人指点，功力大增！', p:45, c:15 },
    { text:'偶遇灵药，服之功力倍增！', p:55, c:10 },
    { text:'在山洞中发现失传秘籍！', p:65, c:20 },
    { text:'救助一位老者，获赠内功心法！', p:40, c:28 },
    { text:'与高手切磋，领悟武学真谛！', p:50, c:18 },
    { text:'在绝境中突破自我！', p:60, c:22 },
    { text:'于悬崖边悟得轻功要诀！', p:35, c:35 },
    { text:'夜观星象，顿悟天地大道！', p:20, c:50 },
];

const ACHIEVEMENTS = [
    { id:'a1', name:'初出茅庐', desc:'第一次修炼', check:g=>g.totalActions>=1, reward:50 },
    { id:'a2', name:'持之以恒', desc:'修炼10天', check:g=>g.days>=10, reward:100 },
    { id:'a3', name:'百日筑基', desc:'修炼100天', check:g=>g.days>=100, reward:500 },
    { id:'a4', name:'小有所成', desc:'功力达到1000', check:g=>g.power>=1000, reward:200 },
    { id:'a5', name:'一代宗师', desc:'功力达到10000', check:g=>g.power>=10000, reward:1000 },
    { id:'a6', name:'武林传说', desc:'功力达到100000', check:g=>g.power>=100000, reward:5000 },
    { id:'a7', name:'崭露头角', desc:'达到小有名气境界', check:g=>g.realm>=2, reward:300 },
    { id:'a8', name:'宗师风范', desc:'达到一代宗师境界', check:g=>g.realm>=5, reward:2000 },
    { id:'a9', name:'百炼成钢', desc:'完成100次行动', check:g=>g.totalActions>=100, reward:500 },
    { id:'a10', name:'千锤百炼', desc:'完成500次行动', check:g=>g.totalActions>=500, reward:2000 },
    { id:'a11', name:'天选之人', desc:'完成1000次行动', check:g=>g.totalActions>=1000, reward:5000 },
    { id:'a12', name:'以武入道', desc:'达到绝世高手境界', check:g=>g.realm>=7, reward:10000 },
];

// ======== 游戏状态 ========
let g = loadGame();
let floatingId = 0;

function defaultGame(){
    return {
        power:0, cultivation:0, days:1,
        realm:0, totalActions:0,
        achievements:[], logs:['初入江湖，一切从零开始...'],
        lastSave:Date.now()
    };
}

function loadGame(){
    try{
        const s = localStorage.getItem('wuxia2');
        if(s) return JSON.parse(s);
    }catch(e){}
    return defaultGame();
}

function save(){
    g.lastSave = Date.now();
    try{ localStorage.setItem('wuxia2', JSON.stringify(g)); }catch(e){}
}

// ======== 核心 ========
function getRealmIdx(){
    for(let i=REALMS.length-1;i>=0;i--) if(g.power>=REALMS[i].minPower) return i;
    return 0;
}

function doAction(skillId){
    const skill = SKILLS.find(s=>s.id===skillId);
    if(!skill) return;
    const realm = getRealmIdx();
    if(skill.unlock > realm){ log(`🔒 ${skill.name} 需要达到「${REALMS[skill.unlock].name}」境界`); return; }
    if(skill.cd > 0){ log(`⏳ ${skill.name} 还需冷却 ${skill.cd} 回合`); return; }

    const result = skill.gain(g.power);
    g.power += result.power;
    g.cultivation += result.cult;
    g.days++;
    g.totalActions++;
    skill.cd = skill.cdMax;
    
    // 降CD
    SKILLS.forEach(s=>{ if(s.cd>0) s.cd--; });

    let logText = skill.name;
    if(result.power>0 && result.cult>0) logText += `：功力 +${result.power}，修为 +${result.cult}`;
    else if(result.power>0) logText += `：功力 +${result.power}`;
    else if(result.cult>0) logText += `：修为 +${result.cult}`;
    
    // 奇遇特殊处理
    if(skill.id==='adventure'){
        const adv = ADVENTURES[Math.floor(Math.random()*ADVENTURES.length)];
        g.power += adv.p;
        g.cultivation += adv.c;
        logText = `🌄 ${adv.text} 功力 +${adv.p}，修为 +${adv.c}`;
    }
    
    log(logText);
    if(result.power>0) float('+' + result.power + ' 功力', '#d4a574');
    if(result.cult>0) float('+' + result.cult + ' 修为', '#f0d6a8');
    
    checkRealm();
    checkAch();
    updateUI();
    save();
}

function checkRealm(){
    const nr = getRealmIdx();
    if(nr > g.realm){
        g.realm = nr;
        const r = REALMS[nr];
        log(`✨ 境界突破！踏入「${r.name}」之境！`, 'hl');
        showModal('✨ 境界突破', `<p>历经${g.days}日苦修，你终于踏入</p><p style="font-size:20px;font-weight:700;margin:12px 0;color:${r.color}">「${r.name}」</p><p style="color:#a08a70">武学之道，永无止境...</p>`);
        const bonus = Math.floor(g.power * 0.08) + 50;
        g.power += bonus;
        log(`🎉 突破奖励：功力 +${bonus}`, 'hl');
    }
}

function checkAch(){
    ACHIEVEMENTS.forEach(a=>{
        if(!g.achievements.includes(a.id) && a.check(g)){
            g.achievements.push(a.id);
            log(`🏆 成就达成：「${a.name}」`, 'ach');
            g.power += a.reward;
            log(`🎁 成就奖励：功力 +${a.reward}`, 'ach');
            showModal('🏆 成就达成', `<p style="font-size:22px;font-weight:700">「${a.name}」</p><p style="color:#a08a70;margin:8px 0">${a.desc}</p><p style="color:#ffd700">奖励功力 +${a.reward}</p>`);
        }
    });
}

// ======== UI ========
function updateUI(){
    const r = REALMS[getRealmIdx()];
    // 人物
    document.getElementById('portraitFigure').textContent = r.emoji;
    document.getElementById('portraitName').textContent = r.title;
    document.getElementById('portraitTitle').textContent = r.icon+' '+r.name;
    document.getElementById('portraitFigure').style.color = r.color;
    // 境界
    const badge = document.getElementById('realmBadge');
    badge.textContent = r.icon+' Lv.'+(g.realm+1)+' '+r.name;
    badge.style.borderColor = r.color+'40';
    badge.style.color = r.color;
    // 进度
    const next = REALMS[g.realm+1];
    if(next){
        const progress = ((g.power - r.minPower) / (next.minPower - r.minPower)) * 100;
        document.getElementById('progressFill').style.width = Math.min(100, progress) + '%';
        document.getElementById('progressCurrent').textContent = `功力 ${fmt(g.power)}`;
        document.getElementById('progressNext').textContent = `下一境: ${fmt(next.minPower)}`;
    }else{
        document.getElementById('progressFill').style.width = '100%';
        document.getElementById('progressCurrent').textContent = `功力 ${fmt(g.power)}`;
        document.getElementById('progressNext').textContent = '已至化境';
    }
    // 属性
    document.getElementById('sPower').textContent = fmt(g.power);
    document.getElementById('sCult').textContent = fmt(g.cultivation);
    document.getElementById('sDays').textContent = g.days;
    document.getElementById('sAch').textContent = g.achievements.length+'/'+ACHIEVEMENTS.length;
    // 武功
    renderSkills();
}

function renderSkills(){
    const realm = getRealmIdx();
    const html = SKILLS.map(s=>{
        const locked = s.unlock > realm;
        const cdText = s.cd > 0 ? `<span style="color:#5a4a3a">冷却 ${s.cd} 回合</span>` : '';
        return `<div class="skill-card ${locked?'locked':''}" onclick="doAction('${s.id}')">
            <div class="sk-icon">${s.icon}</div>
            <div class="sk-name">${s.name}</div>
            <div class="sk-desc">${locked ? '🔒 需要「'+REALMS[s.unlock].name+'」' : s.desc}</div>
            <div class="sk-gain">${cdText}</div>
        </div>`;
    }).join('');
    document.getElementById('skillsList').innerHTML = html;
}

function fmt(n){
    if(n>=10000000) return (n/100000000).toFixed(1)+'亿';
    if(n>=1000000) return (n/10000).toFixed(1)+'万';
    if(n>=10000) return (n/10000).toFixed(2)+'万';
    return Math.floor(n);
}

function log(text, cls=''){
    const t = '第'+g.days+'日';
    g.logs.push('['+t+'] '+text);
    if(g.logs.length>100) g.logs = g.logs.slice(-100);
    const box = document.getElementById('logBox');
    box.innerHTML += `<div class="le"><span class="tm">[${t}]</span><span class="${cls||''}">${text}</span></div>`;
    box.scrollTop = box.scrollHeight;
}

function float(text, color){
    const el = document.createElement('div');
    el.className = 'floating';
    el.textContent = text; el.style.color = color;
    el.style.left = (20+Math.random()*60)+'%';
    el.style.top = (30+Math.random()*30)+'%';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1800);
}

function showModal(title, html){
    const ov = document.createElement('div');
    ov.className = 'modal-overlay';
    ov.innerHTML = `<div class="modal"><div class="m-icon">${title.includes('境界')?'⚔️':title.includes('成就')?'🏆':'📜'}</div><h2>${title}</h2>${html}<br><button class="modal-btn" onclick="this.closest('.modal-overlay').remove()">继续修炼</button></div>`;
    document.body.appendChild(ov);
}

// ======== 离线 ========
function checkOffline(){
    const now = Date.now();
    const el = now - (g.lastSave || now);
    if(el > 30000 && g.days > 1){
        const od = Math.floor(el / 15000);
        if(od > 0){
            g.days += od;
            const pg = Math.floor(od * (2 + g.cultivation * 0.02));
            const cg = Math.floor(od * 3);
            g.power += pg; g.cultivation += cg;
            log(`⏰ 离线修炼归来！功力 +${pg}，修为 +${cg}（${od}天）`, 'hl');
            checkRealm(); checkAch();
        }
    }
}

// iOS touch激活
document.addEventListener('touchstart', function(){}, false);

// ======== 初始化 ========
function init(){
    checkOffline();
    updateUI();
    const box = document.getElementById('logBox');
    box.innerHTML = g.logs.slice(-30).map(l=>{
        const m = l.match(/\[(.+?)\]/);
        const t = m?m[1]:''; const txt = l.replace(/\[.+?\]\s*/,'');
        const cls = l.includes('✨')||l.includes('🎉')||l.includes('⏰')?'hl':l.includes('🏆')?'ach':'';
        return `<div class="le"><span class="tm">[${t}]</span><span class="${cls}">${txt}</span></div>`;
    }).join('');
    box.scrollTop = box.scrollHeight;
    setInterval(save, 15000);
    log('小空为你护法，开始修炼吧！');
    save();
}

document.addEventListener('visibilitychange', ()=>{
    if(!document.hidden) init();
});

// 等DOM加载完再初始化
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}
</script>
</body>
</html>
