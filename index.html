<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>武侠·崛起</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a120e;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'STKaiti','KaiTi',serif;touch-action:none;}
canvas{display:block;background:#2c1810;}
#wrap{position:relative;width:480px;height:720px;}
#hud{position:absolute;top:0;left:0;right:0;height:30px;background:rgba(44,24,16,0.85);display:flex;align-items:center;padding:0 10px;color:#e8d5b0;font-size:10px;justify-content:space-between;z-index:5;pointer-events:none;}
</style>
</head>
<body>
<div id="wrap">
<canvas id="cv" width="480" height="690"></canvas>
<div id="hud"><span id="hL">功力 0 · 修为 0 · 第1日</span><span id="hR">摇杆移动</span></div>
</div>
<script>
// ===== Canvas =====
const W=480,H=690;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

// ===== 地图(20x28 tiles, 24px/tile) =====
const TS=24,CO=20,RO=28;
const MAP=[
"11111111111111111111","10000000300000000001","10000000300000000001","10000000300000000001","10000000000000011101","10000000000000000001","10001111000000000001","10000000000000000001","10000000000000000001","10000001000100000001","10001111000111100001","10000001000100000001","10000001000100000001","10000001000100000001","10000000000000000001","10000000000000111101","10222200000000000001","10222200000000000001","10222200000000000001","10022200000000000001","10000000000000000001","10000111100011100001","11111000000000000001","10000000000000000001","10000000000000000001","10000000000000000001","10000000000000000001","11111111111111111111",
];
// 建筑标注
const SS=[{n:'小屋',x:4,y:4,w:2},{n:'练功场',x:17,y:5,w:2},{n:'钓鱼台',x:3,y:16,w:2},{n:'后山',x:17,y:16,w:2},{n:'藏书阁',x:6,y:9,w:2},{n:'山门',x:18,y:4,w:2}];

// ===== 游戏状态 =====
let G={p:0,c:0,d:1,b:[]};
function ld(){try{let s=localStorage.getItem('wx3');if(s)return JSON.parse(s)}catch(e){}return{p:0,c:0,d:1,b:[]};}
function sv(){G.last=Date.now();try{localStorage.setItem('wx3',JSON.stringify(G))}catch(e){}}
G=ld();if(!G.b)G.b=[];

let px=W/2,py=H/2,dir=0,wk=0,mv=false,batting=false,cm=null;
let k={};
document.addEventListener('keydown',e=>{k[e.key]=true;if(e.key.startsWith('Arrow')||e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{k[e.key]=false;});

// ===== 摇杆+按钮 =====
let jDx=0,jDy=0,jA=false,jP=null;
const je=document.createElement('div');je.style.cssText='position:fixed;left:25px;top:570px;width:100px;height:100px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);z-index:100;touch-action:none;pointer-events:none;';
const jk=document.createElement('div');jk.style.cssText='position:fixed;left:37px;top:582px;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.4),rgba(200,200,200,0.15));border:1px solid rgba(255,255,255,0.3);z-index:101;touch-action:none;';
document.body.appendChild(je);document.body.appendChild(jk);
jk.addEventListener('pointerdown',e=>{e.preventDefault();jA=true;jP=e.pointerId;jk.setPointerCapture(e.pointerId);});
document.addEventListener('pointermove',e=>{if(!jA||e.pointerId!==jP)return;let dx=e.clientX-75,dy=e.clientY-620,d=Math.hypot(dx,dy),mx=30;if(d>mx){dx=dx/d*mx;dy=dy/d*mx;}jk.style.left=(75+dx-20)+'px';jk.style.top=(620+dy-20)+'px';jDx=d>5?dx/mx:0;jDy=d>5?dy/mx:0;});
document.addEventListener('pointerup',e=>{if(e.pointerId===jP){jA=false;jP=null;jDx=0;jDy=0;jk.style.left='37px';jk.style.top='582px';}});
document.addEventListener('pointercancel',e=>{if(e.pointerId===jP){jA=false;jP=null;jDx=0;jDy=0;jk.style.left='37px';jk.style.top='582px';}});

const ab=document.createElement('div');ab.textContent='⚔️';ab.style.cssText='position:fixed;left:350px;top:570px;width:55px;height:55px;border-radius:50%;background:radial-gradient(circle,rgba(192,57,43,0.5),rgba(139,37,0,0.2));border:2px solid rgba(255,255,255,0.3);z-index:100;touch-action:none;display:flex;align-items:center;justify-content:center;font-size:20px;';
let atk=false;
ab.addEventListener('pointerdown',e=>{e.preventDefault();atk=true;ab.style.transform='scale(0.85)';});
ab.addEventListener('pointerup',e=>{atk=false;ab.style.transform='scale(1)';});
ab.addEventListener('pointercancel',e=>{atk=false;ab.style.transform='scale(1)';});
document.body.appendChild(ab);

// ===== 碰撞+移动 =====
function can(tx,ty){return tx>=0&&tx<CO&&ty>=0&&ty<RO&&'0345678'.includes(MAP[ty][tx]);}
function col(nx,ny){return can(Math.floor(nx/TS),Math.floor(ny/TS))&&can(Math.ceil(nx/TS)-1,Math.floor(ny/TS))&&can(Math.floor(nx/TS),Math.ceil(ny/TS)-1)&&can(Math.ceil(nx/TS)-1,Math.ceil(ny/TS)-1);}

function upd(){
  if(batting)return;
  let dx=0,dy=0;
  if(k['ArrowUp']||k['w']){dy=-1;dir=3;}else if(k['ArrowDown']||k['s']){dy=1;dir=0;}else if(k['ArrowLeft']||k['a']){dx=-1;dir=1;}else if(k['ArrowRight']||k['d']){dx=1;dir=2;}
  else if(jDx||jDy){dx=jDx;dy=jDy;if(Math.abs(dx)>Math.abs(dy)){dir=dx>0?2:1;}else{dir=dy>0?0:3;}}
  if(dx||dy){let sp=3,nx=px+dx*sp,ny=py+dy*sp;if(col(nx,ny)){px=nx;py=ny;mv=true;wk++;}else{mv=false;wk=0;}}else{mv=false;wk=0;}
  px=Math.max(5,Math.min(W-5,px));py=Math.max(15,Math.min(H-15,py));
  if((atk||k[' '])&&!batting){
    k[' ']=false;atk=false;
    if(px<TS*5&&py>TS*12&&py<TS*20){
      const pool=[{n:'野狼',i:'🐺',h:30,a:5,e:8},{n:'野猪',i:'🐗',h:50,a:7,e:12}];
      batting=true;cm={...pool[Math.floor(Math.random()*pool.length)]};cm.mh=cm.h;
    }
  }
}

function bat(a){
  if(!batting||!cm)return;
  if(a==='run'){batting=false;cm=null;return;}
  let dm=Math.floor((5+G.p/100)*(0.5+Math.random()*0.5));
  if(a==='def')dm=Math.floor(dm*0.5);
  cm.h-=dm;
  if(cm.h>0){let md=Math.floor(cm.a*(0.5+Math.random()*0.5));if(a==='def')md=Math.floor(md*0.3);G.p-=md;if(G.p<0)G.p=0;}
  else{G.p+=cm.e;G.c+=Math.floor(cm.e*0.5);G.d++;batting=false;cm=null;}
  sv();
}

// ===== 程序生成古风tile纹理 =====
function genTileTexture(type){
  const c=document.createElement('canvas');c.width=TS;c.height=TS;
  const cx=c.getContext('2d');
  switch(type){
    case 'g': // 草地
      cx.fillStyle='#7a9a5a';cx.fillRect(0,0,TS,TS);
      for(let i=0;i<15;i++){cx.fillStyle='#8aba6a';cx.fillRect(Math.random()*20|0,Math.random()*20|0,3,3);}
      for(let i=0;i<5;i++){cx.fillStyle='#5a7a3a';cx.beginPath();cx.arc(Math.random()*20|0,Math.random()*20|0,1,0,Math.PI*2);cx.fill();}
      break;
    case 'w': // 墙
      cx.fillStyle='#4a5a3a';cx.fillRect(0,0,TS,TS);
      ctx.strokeStyle='#5a6a4a';ctx.lineWidth=1;
      for(let y=0;y<TS;y+=8){cx.beginPath();cx.moveTo(0,y);cx.lineTo(TS,y);cx.stroke();}
      break;
    case 's': // 水
      cx.fillStyle='#4a7ab5';cx.fillRect(0,0,TS,TS);
      for(let i=0;i<8;i++){cx.fillStyle='rgba(74,138,181,0.3)';cx.beginPath();cx.arc(Math.random()*20|0,Math.random()*20|0,3,0,Math.PI*2);cx.fill();}
      break;
    case 'r': // 路
      cx.fillStyle='#b5a680';cx.fillRect(0,0,TS,TS);
      for(let i=0;i<10;i++){cx.fillStyle='#c5b690';cx.fillRect(Math.random()*20|0,Math.random()*20|0,2,2);}
      break;
    case 'b': // 建筑
      cx.fillStyle='#8b6914';cx.fillRect(0,0,TS,TS);
      break;
    default: // 草地
      cx.fillStyle='#8aba6a';cx.fillRect(0,0,TS,TS);
  }
  return c;
}

// 预生成所有tile纹理
const TILE_IMG = {
  '0': genTileTexture('g'), '1': genTileTexture('w'), '2': genTileTexture('s'),
  '3': genTileTexture('r'), '4': genTileTexture('b'), '5': genTileTexture('r'),
  '6': genTileTexture('r'), '7': genTileTexture('b'), '8': genTileTexture('b'),
};

// ===== 渲染 =====
function draw(){
  ctx.clearRect(0,0,W,H);
  // 用地砖贴图绘制地图
  for(let y=0;y<RO;y++)for(let x=0;x<CO;x++){
    const c=MAP[y][x];
    const img=TILE_IMG[c]||TILE_IMG['0'];
    ctx.drawImage(img,0,0,TS,TS,x*TS,y*TS,TS,TS);
    // 屋顶
    if(c==='4'){ctx.fillStyle='#a07040';ctx.beginPath();ctx.moveTo(x*TS,y*TS+TS);ctx.lineTo(x*TS+TS/2,y*TS);ctx.lineTo(x*TS+TS,y*TS+TS);ctx.closePath();ctx.fill();}
  }
  // 建筑标注
  ctx.font='9px STKaiti';ctx.textAlign='center';ctx.fillStyle='#2c1810';
  for(const s of SS)ctx.fillText(s.n,(s.x+s.w/2)*TS,s.y*TS-2);
  // 主角
  const cx=Math.round(px),cy=Math.round(py);
  ctx.fillStyle='rgba(0,0,0,0.1)';ctx.beginPath();ctx.ellipse(cx+1,cy+14,7,2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a6a4a';ctx.fillRect(cx-5,cy-7,10,16);
  ctx.fillStyle='#f0d8a0';ctx.beginPath();ctx.arc(cx,cy-11,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2c1810';ctx.beginPath();ctx.arc(cx-1,cy-14,5,0,Math.PI*2);ctx.fill();
  ctx.fillRect(cx-2,cy-19,4,5);
  const sw=Math.sin(wk*0.3)*2;
  ctx.strokeStyle='#ccc';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx+7,cy-3);ctx.lineTo(cx+10+sw,cy+10+sw);ctx.stroke();
  // 战斗弹窗
  if(batting&&cm){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
    ctx.font='48px serif';ctx.textAlign='center';ctx.fillText(cm.i||'🐺',W/2,H*0.35);
    ctx.font='13px STKaiti';ctx.fillStyle='#e8d5b0';ctx.fillText(cm.n+' HP:'+cm.h+'/'+cm.mh,W/2,H*0.45);
    ctx.fillStyle='#333';ctx.fillRect(W*0.2,H*0.49,W*0.6,12);
    ctx.fillStyle='#c0392b';ctx.fillRect(W*0.2,H*0.49,W*0.6*(cm.h/cm.mh),12);
    ctx.font='14px STKaiti';ctx.fillStyle='#fff';ctx.fillText('⚔️ATK  🛡️DEF  🏃RUN',W/2,H*0.6);
  }
}

function loop(){upd();draw();document.getElementById('hL').textContent='功力 '+G.p+' · 修为 '+G.c+' · 第'+G.d+'日';requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
