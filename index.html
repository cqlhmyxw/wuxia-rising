<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>武侠·崛起</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a120e;overflow:hidden;touch-action:none;font-family:'KaiTi','STKaiti',serif}
canvas{display:block;width:100vw;height:100dvh}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a120e;color:#e8d5a0;display:flex;justify-content:center;align-items:center;font-size:20px;z-index:100;flex-direction:column;gap:10px}
#loading small{font-size:12px;color:#a08060}
#hud{position:fixed;top:0;left:0;right:0;height:40px;background:linear-gradient(180deg,rgba(30,18,10,.92),rgba(30,18,10,.7));display:flex;align-items:center;padding:0 12px;color:#e8d5a0;font-size:14px;z-index:10;gap:10px;pointer-events:none}
#joystick{position:fixed;left:20px;bottom:30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);z-index:20;display:none;touch-action:none}
#joystick .knob{position:absolute;top:50%;left:50%;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.35);transform:translate(-50%,-50%);pointer-events:none}
@media(hover:none)and(pointer:coarse){#joystick{display:block}}
</style>
</head>
<body>
<div id="loading">加载中...<small>首次需加载 external 库</small></div>
<div id="hud"><span>武侠·崛起</span></div>
<div id="joystick"><div class="knob" id="knob"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
document.getElementById('loading').style.display = 'none';

const scene=new THREE.Scene(); scene.background=new THREE.Color(0x87CEEB);
const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,200); camera.position.set(15,12,20);
const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(window.innerWidth,window.innerHeight);
document.body.insertBefore(renderer.domElement,document.body.firstChild);

const controls=new THREE.OrbitControls(camera,renderer.domElement); controls.enableDamping=true; controls.target.set(0,0,0); controls.update();

renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const ambient=new THREE.AmbientLight(0x404060,0.4); scene.add(ambient);
const sun=new THREE.DirectionalLight(0xffe8c0,1.2); sun.position.set(30,40,20); sun.castShadow=true; scene.add(sun);
const fill=new THREE.DirectionalLight(0x8888ff,0.3); fill.position.set(-20,10,-10); scene.add(fill);

const ground=new THREE.Mesh(new THREE.PlaneGeometry(60,60),new THREE.MeshStandardMaterial({color:0x7a9a5a,roughness:0.9}));
ground.rotation.x=-Math.PI/2; ground.position.y=-0.1; ground.receiveShadow=true; scene.add(ground);

function createPlayer(){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.45,0.9,8),new THREE.MeshStandardMaterial({color:0x3a6a4a,roughness:0.7}));
  body.position.y=0.7; body.castShadow=true; g.add(body);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.28,10,10),new THREE.MeshStandardMaterial({color:0xe8c080,roughness:0.5}));
  head.position.y=1.2; head.castShadow=true; g.add(head);
  const bun=new THREE.Mesh(new THREE.SphereGeometry(0.12,6,6),new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.9}));
  bun.position.set(0,1.42,0.08); g.add(bun);
  const lArm=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.09,0.4,6),new THREE.MeshStandardMaterial({color:0x3a6a4a,roughness:0.7}));
  lArm.position.set(-0.38,0.8,0); lArm.rotation.z=0.15; lArm.castShadow=true; g.add(lArm);
  const rArm=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.09,0.4,6),new THREE.MeshStandardMaterial({color:0x3a6a4a,roughness:0.7}));
  rArm.position.set(0.38,0.8,0); rArm.rotation.z=-0.15; rArm.castShadow=true; g.add(rArm);
  const sword=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.5,0.015),new THREE.MeshStandardMaterial({color:0xd0d0d0,metalness:0.8,roughness:0.2}));
  sword.position.set(0.45,0.55,0); g.add(sword);
  const sHandle=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.12,0.03),new THREE.MeshStandardMaterial({color:0x4a2a0a,roughness:0.9}));
  sHandle.position.set(0.45,0.25,0); g.add(sHandle);
  const belt=new THREE.Mesh(new THREE.TorusGeometry(0.25,0.04,6,12),new THREE.MeshStandardMaterial({color:0x8b4513,roughness:0.8}));
  belt.position.y=0.5; belt.rotation.x=Math.PI/2; g.add(belt);
  const skirt=new THREE.Mesh(new THREE.ConeGeometry(0.35,0.15,8),new THREE.MeshStandardMaterial({color:0x3a6a4a,roughness:0.7}));
  skirt.position.y=0.25; g.add(skirt);
  return g;
}

const player=createPlayer(); player.position.set(0,0,0); scene.add(player);

const keys={}; let jDx=0,jDy=0; let playerAngle=0;
document.addEventListener('keydown',e=>{keys[e.key]=true;if('ArrowUp,ArrowDown,ArrowLeft,ArrowRight, '.split(',').includes(e.key))e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.key]=false});

const jDiv=document.getElementById('joystick'),knob=document.getElementById('knob');
let jActive=false,jId=null;
jDiv.addEventListener('pointerdown',e=>{jActive=true;jId=e.pointerId;jDiv.setPointerCapture(e.pointerId);updateJoystick(e)});
jDiv.addEventListener('pointermove',e=>{if(jActive&&e.pointerId===jId)updateJoystick(e)});
jDiv.addEventListener('pointerup',e=>{if(e.pointerId===jId){jActive=false;jId=null;jDx=0;jDy=0;knob.style.transform='translate(-50%,-50%)'}});
jDiv.addEventListener('pointercancel',e=>{if(e.pointerId===jId){jActive=false;jId=null;jDx=0;jDy=0;knob.style.transform='translate(-50%,-50%)'}});
function updateJoystick(e){
  const rect=jDiv.getBoundingClientRect(); const cx=rect.width/2,cy=rect.height/2;
  let dx=e.clientX-rect.left-cx,dy=e.clientY-rect.top-cy;
  const dist=Math.sqrt(dx*dx+dy*dy),r=55;
  if(dist>r){dx=dx/dist*r;dy=dy/dist*r}
  jDx=dx/r;jDy=dy/r;knob.style.transform=`translate(${dx-25}px,${dy-25}px)`;
}

window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});

function update(){
  let dx=0,dy=0;
  if(keys.ArrowUp||keys.w||keys.W||jDy<-0.3)dy=-1;
  if(keys.ArrowDown||keys.s||keys.S||jDy>0.3)dy=1;
  if(keys.ArrowLeft||keys.a||keys.A||jDx<-0.3)dx=-1;
  if(keys.ArrowRight||keys.d||keys.D||jDx>0.3)dx=1;
  if(dx||dy){
    const l=Math.sqrt(dx*dx+dy*dy);
    const nx=player.position.x+dx/l*5*0.016,nz=player.position.z+dy/l*5*0.016;
    player.position.x=Math.max(-28,Math.min(28,nx)); player.position.z=Math.max(-28,Math.min(28,nz));
    const ta=Math.atan2(dx,dy); let diff=ta-playerAngle;
    while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
    playerAngle+=diff*0.15; player.rotation.y=playerAngle;
    player.position.y=Math.sin(Date.now()*0.008)*0.04;
  }else{player.position.y=0}
  controls.target.lerp(new THREE.Vector3(player.position.x,0,player.position.z),0.05);
  controls.update();
  renderer.render(scene,camera); requestAnimationFrame(update);
}
update();
</script>
</body>
</html>
