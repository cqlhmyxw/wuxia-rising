<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>武侠·崛起</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a120e;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'STKaiti','KaiTi',serif;}
canvas{width:480px;height:720px;display:block;background:#2c1810;border-radius:3px;box-shadow:0 0 25px rgba(0,0,0,0.5);}
#ui{position:relative;width:480px;height:720px;}
#hud{position:absolute;top:0;left:0;right:0;height:36px;background:rgba(44,24,16,0.85);display:flex;align-items:center;padding:0 12px;color:#e8d5b0;font-size:12px;justify-content:space-between;z-index:5;pointer-events:none;}
#msg{position:absolute;bottom:6px;left:6px;right:6px;text-align:center;font-size:11px;color:#a08060;z-index:5;pointer-events:none;background:rgba(245,230,200,0.65);border-radius:4px;padding:4px;min-height:22px;}
</style>
</head>
<body>
<div id="ui">
<canvas id="g" width="480" height="684"></canvas>
<div id="hud"><span id="hL">功力 0 · 修为 0 · 第1日</span><span id="hR">←↑↓→ 走</span></div>
<div id="msg">走到建筑处进入场景</div>
</div>
<script>
// ======== 工具 ========
const TS=24,COLS=20,ROWS=28; // 480/24=20, 672/24=28  (HUD占36px)
const W=480,H=672;
const cv=document.getElementById('g');
const ctx=cv.getContext('2d');

// ======== 地图 ========
// 0=草 1=墙 2=水 3=路 4=屋顶 5=木桩 6=书架 7=山门
const M=[
"11111111111111111111",
"10000000300000000001",
"10000000300003333001",
"10000000300000000001",
"10003443000000111101",
"10000000000010000001",
"10000000000010000001",
"10003130000010000001",
"10000000000010000001",
"10000001000100000001",
"10001111000111100001",
"10000001000100000001",
"10000001000100066001",
"10000000000100066001",
"10003330000000066001",
"10000000000000000001",
"10222200000001111001",
"10222200000000000001",
"10222200000000000001",
"10022200000000000001",
"10000000000000000001",
"10000111100011100001",
"11111000000000070001",
"10000000000000070001",
"10000000000000070001",
"10000000000000070001",
"10000000000000000001",
"11111111111111111111",
];

// ======== 游戏状态 ========
let G={p:0,c:0,d:1,sp:[]};
function ld(){try{let s=localStorage.getItem('wx2');if(s)return JSON.parse(s)}catch(e){}return{p:0,c:0,d:1,sp:[]};}
function sv(){G.last=Date.now();try{localStorage.setItem('wx2',JSON.stringify(G))}catch(e){}}
G=ld();

// 主角(像素坐标)
let px=TS*10,py=TS*15;
let dir=0, walk=0, moving=false;

// 输入
let k={};
document.addEventListener('keydown',e=>{k[e.key]=true;if(e.key.startsWith('Arrow'))e.preventDefault();});
document.addEventListener('keyup',e=>{k[e.key]=false;});

// ======== 碰撞 ========
function walkable(tx,ty){
  if(tx<0||tx>=COLS||ty<0||ty>=ROWS)return false;
  const c=M[ty][tx];
  return c==='0'||c==='3'||c==='5'||c==='6'||c==='7'||c==='4';
}

function collides(nx,ny,r){
  return walkable(Math.floor((nx-r)/TS),Math.floor((ny-r)/TS)) && walkable(Math.floor((nx+r)/TS),Math.floor((ny-r)/TS)) 
      && walkable(Math.floor((nx-r)/TS),Math.floor((ny+r)/TS)) && walkable(Math.floor((nx+r)/TS),Math.floor((ny+r)/TS));
}

// ======== 主循环 ========
let ft=0;

function update(){
  ft++;
  let dx=0,dy=0;
  if(k['ArrowUp']||k['w']||k['W']){dy=-2;dir=3;}
  if(k['ArrowDown']||k['s']||k['S']){dy=2;dir=0;}
  if(k['ArrowLeft']||k['a']||k['A']){dx=-2;dir=1;}
  if(k['ArrowRight']||k['d']||k['D']){dx=2;dir=2;}
  if(dx||dy){moving=true;walk++;}else{moving=false;walk=0;}
  const sp=2.5;
  let nx=px+dx*sp,ny=py+dy*sp;
  if(collides(nx,ny,8)){px=nx;py=ny;}
}

function draw(){
  // 地图
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const c=M[y][x];
      let col='';
      switch(c){
        case '0':col='#8aba6a';break;
        case '1':col='#3a5a2a';break;
        case '2':col='#4a8ab5';break;
        case '3':col='#c5a680';break;
        case '4':col='#8b6914';break;
        case '5':col='#5a3a2a';break;
        case '6':col='#d4a574';break;
        case '7':col='#6a4a2a';break;
      }
      ctx.fillStyle=col;
      ctx.fillRect(x*TS,y*TS,TS,TS);
      
      // 屋顶(4)
      if(c==='4'){
        ctx.fillStyle='#a07040';
        ctx.beginPath();
        ctx.moveTo(x*TS,y*TS+TS);
        ctx.lineTo(x*TS+TS/2,y*TS);
        ctx.lineTo(x*TS+TS,y*TS+TS);
        ctx.closePath();ctx.fill();
      }
      // 木桩(5)
      if(c==='5'){
        ctx.fillStyle='#a08060';
        ctx.fillRect(x*TS+8,y*TS+6,8,18);
      }
      // 门(7)
      if(c==='7'){
        ctx.fillStyle='#d4a574';
        ctx.fillRect(x*TS+4,y*TS+4,16,20);
        ctx.fillStyle='#8b2500';
        ctx.beginPath();
        ctx.arc(x*TS+16,y*TS+14,2,0,Math.PI*2);
        ctx.fill();
      }
    }
  }
  
  // 水面波纹动画
  ctx.fillStyle='rgba(74,138,181,0.15)';
  for(let y=16;y<20;y++){
    for(let x=2;x<6;x++){
      const o=Math.sin(ft*0.03+x+y)*5;
      ctx.beginPath();
      ctx.ellipse(x*TS+12,y*TS+12+o,10,4,0,0,Math.PI*2);
      ctx.fill();
    }
  }
  
  // 主角
  const px2=Math.round(px),py2=Math.round(py);
  // 影子
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(px2+1,py2+14,8,3,0,0,Math.PI*2);
  ctx.fill();
  // 身体
  ctx.fillStyle='#3a6a4a';
  ctx.fillRect(px2-6,py2-8,12,18);
  // 头
  ctx.fillStyle='#f0d8a0';
  ctx.beginPath();
  ctx.arc(px2,py2-12,7,0,Math.PI*2);
  ctx.fill();
  // 头发
  ctx.fillStyle='#2c1810';
  ctx.beginPath();
  ctx.arc(px2-1,py2-15,6,0,Math.PI*2);
  ctx.fill();
  // 发髻
  ctx.fillRect(px2-2,py2-20,4,6);
  // 剑(随走动摆动)
  const sw=Math.sin(walk*0.3)*3;
  ctx.strokeStyle='#ccc';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(px2+8,py2-4);
  ctx.lineTo(px2+12+sw,py2+12+sw);
  ctx.stroke();
  // 剑柄
  ctx.fillStyle='#8b6914';
  ctx.fillRect(px2+6,py2-6,5,4);
}

function loop(){
  update();
  ctx.clearRect(0,0,W,H);
  draw();
  // HUD更新
  document.getElementById('hL').textContent=`功力 ${G.p} · 修为 ${G.c} · 第${G.d}日`;
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
